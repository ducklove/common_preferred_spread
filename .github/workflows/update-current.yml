name: Update Current Prices

on:
  schedule:
    # 장중 30분 간격 + 마감 후 16:00 1회 (한국시간 월~금)
    - cron: "0,30 0-6 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Fetch current prices
        run: python fetch_current.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "현재가 갱신 ($(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M'))"
            git push
          fi
