name: Update Current Prices

on:
  schedule:
    # 장중 30분 간격 + 16:00/21:00 추가 갱신 (한국시간 월~금)
    - cron: "0,30 0-6 * * 1-5"
    - cron: "0 7 * * 1-5"
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Fetch current prices
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_AUTH_CACHE_PATH: ${{ runner.temp }}/kis_auth_cache.json
        run: python fetch_current.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "현재가 갱신 ($(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M'))"
            git push
          fi
