<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우선주 괴리율 대시보드</title>
<script>
(function() {
  try {
    var theme = localStorage.getItem('preferred-theme');
    document.documentElement.dataset.theme = theme === 'light' ? 'light' : 'dark';
  } catch (e) {
    document.documentElement.dataset.theme = 'dark';
  }
})();
</script>
<style>
:root {
  color-scheme: dark;
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e4e7f1;
  --text-dim: #8b90a5;
  --accent: #6c8cff;
  --up: #f0615e;
  --down: #4a90d9;
  --green: #38c96a;
  --today-glow: rgba(108,140,255,0.18);
  --today-gradient-start: rgba(108,140,255,0.12);
  --today-gradient-end: rgba(56,201,106,0.08);
  --today-border: rgba(108,140,255,0.35);
  --button-hover-bg: rgba(108,140,255,0.08);
  --overview-card-bg: rgba(15,17,23,0.38);
  --overview-card-hover-bg: rgba(15,17,23,0.54);
  --overview-card-active-bg: rgba(108,140,255,0.1);
  --overview-card-border: rgba(255,255,255,0.08);
  --overview-primary-bg: rgba(15,17,23,0.26);
  --overview-primary-border: rgba(56,201,106,0.28);
  --soft-border: rgba(255,255,255,0.08);
  --avg-card-bg: rgba(56,201,106,0.06);
  --avg-card-bg-active: rgba(56,201,106,0.12);
  --grid: rgba(255,255,255,0.06);
  --avg-line: rgba(108,140,255,0.3);
  --avg-label: rgba(108,140,255,0.6);
}
:root[data-theme="light"] {
  color-scheme: light;
  --bg: #f3f6fb;
  --surface: #ffffff;
  --surface2: #edf2fb;
  --border: #d5ddeb;
  --text: #172033;
  --text-dim: #5f6981;
  --accent: #315bdb;
  --up: #d24d46;
  --down: #1f78c8;
  --green: #1f9a54;
  --today-glow: rgba(49,91,219,0.16);
  --today-gradient-start: rgba(49,91,219,0.1);
  --today-gradient-end: rgba(31,154,84,0.08);
  --today-border: rgba(49,91,219,0.28);
  --button-hover-bg: rgba(49,91,219,0.1);
  --overview-card-bg: rgba(255,255,255,0.82);
  --overview-card-hover-bg: rgba(241,245,255,0.98);
  --overview-card-active-bg: rgba(49,91,219,0.12);
  --overview-card-border: rgba(23,32,51,0.1);
  --overview-primary-bg: rgba(255,255,255,0.9);
  --overview-primary-border: rgba(31,154,84,0.28);
  --soft-border: rgba(23,32,51,0.1);
  --avg-card-bg: rgba(31,154,84,0.07);
  --avg-card-bg-active: rgba(31,154,84,0.14);
  --grid: rgba(23,32,51,0.08);
  --avg-line: rgba(49,91,219,0.28);
  --avg-label: rgba(49,91,219,0.55);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
.header {
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header .updated-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.header .updated {
  font-size: 13px;
  color: var(--text-dim);
}
.header .theme-btn,
.header .refresh-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.header .theme-btn:hover,
.header .refresh-btn:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--button-hover-bg);
}
.header .theme-btn:disabled,
.header .refresh-btn:disabled {
  cursor: wait;
  opacity: 0.7;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 32px;
}

/* Today overview */
.today-overview {
  background:
    radial-gradient(circle at top right, var(--today-glow), transparent 36%),
    linear-gradient(135deg, var(--today-gradient-start), var(--today-gradient-end)),
    var(--surface);
  border: 1px solid var(--today-border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 24px;
}
.today-overview-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.today-overview-kicker {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.today-overview-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.today-overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.overview-card {
  background: var(--overview-card-bg);
  border: 1px solid var(--overview-card-border);
  border-radius: 12px;
  padding: 16px;
  min-height: 126px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 8px;
}
.overview-card.clickable {
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
}
.overview-card.clickable:hover {
  border-color: var(--accent);
  background: var(--overview-card-hover-bg);
  transform: translateY(-1px);
}
.overview-card.active {
  border-color: var(--accent);
  background: var(--overview-card-active-bg);
}
.overview-card.primary {
  background: var(--overview-primary-bg);
  border-color: var(--overview-primary-border);
}
.overview-card.average-card {
  align-items: center;
  text-align: center;
}
.overview-card.average-card .overview-label,
.overview-card.average-card .overview-detail {
  width: 100%;
}
.overview-card.average-card .overview-label {
  text-align: left;
}
.overview-card.average-card .overview-value {
  font-size: 42px;
  line-height: 1;
}
.overview-card.average-card .overview-summary-grid {
  width: 100%;
  margin-top: 4px;
}
.overview-card.average-card .overview-stat {
  text-align: center;
}
.overview-card.average-card .overview-detail {
  text-align: right;
}
.overview-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.overview-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.8px;
}
.overview-card.leader-card .overview-value {
  font-size: 21px;
  line-height: 1.25;
  letter-spacing: -0.4px;
}
.overview-change {
  font-size: 14px;
  font-weight: 600;
}
.overview-change.up { color: var(--up); }
.overview-change.down { color: var(--down); }
.overview-change.flat { color: var(--text-dim); }
.overview-detail {
  font-size: 12px;
  color: var(--text-dim);
}
.overview-points {
  font-size: 12px;
  color: var(--text-dim);
}
.overview-split {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 170px;
  gap: 14px;
  min-height: 100%;
  align-items: start;
}
.overview-split.market {
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 12px;
}
.overview-split.runners {
  grid-template-columns: minmax(0, 1fr) 132px;
  gap: 12px;
}
.overview-main-copy {
  min-width: 0;
}
.overview-market-line {
  margin-top: 2px;
}
.overview-side-list,
.overview-rank-list {
  border-left: 1px solid var(--soft-border);
  padding-left: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
}
.overview-mini-item {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.overview-mini-label {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}
.overview-mini-data {
  min-width: 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  align-items: baseline;
  gap: 8px;
}
.overview-mini-value {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.2px;
  line-height: 1.2;
}
.overview-mini-change {
  font-size: 11px;
  text-align: right;
  white-space: nowrap;
}
.overview-mini-change.up { color: var(--up); }
.overview-mini-change.down { color: var(--down); }
.overview-mini-change.flat { color: var(--text-dim); }
.overview-summary-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: auto;
}
.overview-stat {
  border-top: 1px solid var(--soft-border);
  padding-top: 10px;
}
.overview-stat-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.overview-stat-value {
  font-size: 15px;
  font-weight: 700;
}

/* Summary cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.card:hover { border-color: var(--accent); }
.card.avg-card { border-color: var(--green); background: var(--avg-card-bg); }
.card.avg-card.active { border-color: var(--green); background: var(--avg-card-bg-active); }
.card.active {
  border-color: var(--accent);
  background: var(--surface2);
}
.card .name,
.overview-card .name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card .spread-val,
.overview-card .spread-val {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -1px;
}
.spread-line {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
}
.overview-value,
.card .spread-val,
.overview-card .spread-val,
.overview-mini-value,
.overview-change,
.overview-points {
  font-variant-numeric: tabular-nums;
}
.card .spread-change,
.overview-card .spread-change {
  font-size: 13px;
  margin-top: 2px;
}
.spread-line .spread-change,
.spread-line .overview-change {
  margin-top: 0;
  white-space: nowrap;
  text-align: right;
}
.overview-card.average-card .spread-line {
  justify-content: center;
  gap: 12px;
}
.overview-card .spread-change.emphasis {
  font-weight: 800;
}
.card .spread-change.up { color: var(--up); }
.card .spread-change.down { color: var(--down); }
.card .spread-change.flat { color: var(--text-dim); }
.overview-card .spread-change.up { color: var(--up); }
.overview-card .spread-change.down { color: var(--down); }
.overview-card .spread-change.flat { color: var(--text-dim); }
.card .prices,
.overview-card .prices {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.price-line {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.price-label {
  min-width: 0;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.price-value {
  margin-left: auto;
  text-align: right;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.change-value {
  display: inline-block;
  min-width: 6.8ch;
  text-align: right;
}
.card .div-yield {
  color: var(--green);
  font-weight: 600;
}
.card .div-info,
.overview-card .div-info {
  color: var(--green);
  font-size: 11px;
  margin-top: 2px;
}
.overview-rank-item {
  appearance: none;
  width: 100%;
  border: none;
  background: transparent;
  color: inherit;
  cursor: pointer;
  font: inherit;
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 1px 0;
  text-align: left;
  transition: color 0.15s, transform 0.15s;
}
.overview-rank-item:hover {
  color: var(--accent);
  transform: translateX(1px);
}
.overview-rank-item.active {
  color: var(--accent);
}
.overview-rank-name {
  font-size: 11.5px;
  font-weight: 600;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.autofit-wrap {
  white-space: normal !important;
  overflow: visible !important;
  text-overflow: clip !important;
  overflow-wrap: anywhere;
}
.overview-rank-meta {
  color: var(--text-dim);
  font-size: 10.5px;
  display: flex;
  align-items: baseline;
  gap: 4px;
  flex-wrap: wrap;
}
.overview-rank-meta .spread-change {
  margin-top: 0;
}
.overview-rank-empty {
  color: var(--text-dim);
  font-size: 11px;
  padding-top: 2px;
}

/* Chart area */
.chart-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
}
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.chart-title {
  font-size: 17px;
  font-weight: 600;
}
.period-btns {
  display: flex;
  gap: 4px;
}
.period-btns button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.period-btns button:hover { border-color: var(--accent); color: var(--text); }
.period-btns button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.chart-container {
  position: relative;
  width: 100%;
  height: 380px;
}
canvas { display: block; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.stat-box .label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-box .value {
  font-size: 20px;
  font-weight: 700;
}

/* Comparison table */
.table-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.table-section h2 {
  font-size: 17px;
  font-weight: 600;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 10px 16px;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
th.numeric,
td.numeric {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
tr:last-child td { border-bottom: none; }
tr:hover { background: var(--surface2); }
.up-color { color: var(--up); }
.down-color { color: var(--down); }
.flat-color { color: var(--text-dim); }

/* Bar in table */
.bar-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}
td.numeric .bar-cell {
  width: 100%;
  justify-content: flex-end;
}
.bar {
  height: 8px;
  border-radius: 4px;
  background: var(--accent);
  transition: width 0.3s;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  min-width: 160px;
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-date { color: var(--text-dim); margin-bottom: 6px; }
.tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }
.tooltip .tt-row span:last-child {
  margin-left: auto;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Price chart */
.price-chart-container {
  position: relative;
  width: 100%;
  height: 250px;
  margin-top: 16px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.price-chart-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.price-legend {
  display: flex;
  gap: 16px;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text-dim);
}
.price-legend span::before {
  content: '';
  display: inline-block;
  width: 12px;
  height: 3px;
  margin-right: 4px;
  vertical-align: middle;
  border-radius: 2px;
}
.price-legend .leg-common::before { background: var(--accent); }
.price-legend .leg-preferred::before { background: var(--up); }
.price-legend .leg-kospi::before { background: var(--green); }

@media (max-width: 768px) {
  .header, .container { padding-left: 16px; padding-right: 16px; }
  .today-overview-title { font-size: 20px; }
  .cards { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .chart-container { height: 280px; }
  .price-chart-container { height: 200px; }
}
@media (max-width: 1100px) {
  .overview-split {
    grid-template-columns: 1fr;
  }
  .overview-split.market {
    grid-template-columns: 1fr;
  }
  .overview-split.runners {
    grid-template-columns: 1fr;
  }
  .overview-side-list,
  .overview-rank-list {
    border-left: none;
    border-top: 1px solid var(--soft-border);
    padding-left: 0;
    padding-top: 12px;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>우선주 괴리율 대시보드</h1>
  <div class="updated-row">
    <div class="updated" id="lastUpdated"></div>
    <button type="button" class="theme-btn" id="themeBtn">일반 모드</button>
    <button type="button" class="refresh-btn" id="refreshBtn">새로 고침</button>
  </div>
</div>

<div class="container">
  <div class="today-overview" id="todayOverview"></div>
  <div class="cards" id="cards"></div>

  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title" id="chartTitle">삼성전자 괴리율 추이</div>
      <div class="period-btns" id="periodBtns">
        <button data-days="30">1M</button>
        <button data-days="90">3M</button>
        <button data-days="180">6M</button>
        <button data-days="365">1Y</button>
        <button data-days="0" class="active">전체</button>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="chart"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="price-chart-container">
      <div class="price-chart-title" id="priceChartTitle">시세 추이</div>
      <div class="price-legend" id="priceLegend"></div>
      <canvas id="priceChart"></canvas>
      <div class="tooltip" id="priceTooltip"></div>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="table-section">
    <h2>종목 비교</h2>
    <table>
      <thead>
        <tr>
          <th>종목</th>
          <th class="numeric">보통주</th>
          <th class="numeric">우선주</th>
          <th class="numeric">현재 괴리율</th>
          <th class="numeric">변동</th>
          <th class="numeric" style="min-width:120px">괴리율</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script src="data.js"></script>
<script>
(function() {
  const pairs = STOCK_DATA.pairs;
  const THEME_STORAGE_KEY = 'preferred-theme';
  const LIVE_REFRESH_MAX_AGE_MS = 60 * 1000;
  const LIVE_REFRESH_RETRY_DELAY_MS = 1500;
  const LIVE_REFRESH_RETRY_ATTEMPTS = 3;
  const LIVE_PROXY_URL = 'https://api.allorigins.win/raw?url=';
  const LIVE_FETCH_CONCURRENCY = 4;
  const MARKET_EXTRA_SPECS = [

  function getCardGroups() {
    const map = new Map();
    pairs.forEach((p, i) => {
      if (p.isAverage) {
        map.set('__avg__', [{ pair: p, idx: i }]);
        return;
      }
      const key = p.commonName;
      if (!map.has(key)) map.set(key, []);
      map.get(key).push({ pair: p, idx: i });
    });
    for (const items of map.values()) {
      items.sort((a, b) => b.pair.current.spread - a.pair.current.spread);
    }
    const groups = [...map.values()];
    const averageGroup = groups.find(items => items[0]?.pair.isAverage) || null;
    const stockGroups = groups
      .filter(items => !items[0]?.pair.isAverage)
      .sort((a, b) => {
        const spreadA = a[0]?.pair.current.spread ?? Number.NEGATIVE_INFINITY;
        const spreadB = b[0]?.pair.current.spread ?? Number.NEGATIVE_INFINITY;
        if (spreadB !== spreadA) return spreadB - spreadA;
        const nameA = a[0]?.pair.commonName || a[0]?.pair.name || '';
        const nameB = b[0]?.pair.commonName || b[0]?.pair.name || '';
        return nameA.localeCompare(nameB, 'ko');
      });

    return averageGroup ? [averageGroup, ...stockGroups] : stockGroups;
  }

  function getRepresentativePairs() {
    return getCardGroups()
      .map(items => items[0].pair)
      .filter(pair => !pair.isAverage);
  }

  function getAveragePair() {
    return pairs.find(pair => pair.isAverage);
  }

  function getAverageHistoryMarketFallback() {
    const averagePair = getAveragePair();
    if (!averagePair) return null;

    const kospiHistory = averagePair.history.filter(entry => entry.kospiPrice != null);
    const latestKospi = kospiHistory[kospiHistory.length - 1];
    const previousKospi = kospiHistory[kospiHistory.length - 2];
    if (!latestKospi) return null;

    return {
      id: 'KOSPI',
      name: '코스피',
      price: +latestKospi.kospiPrice.toFixed(2),
      change: previousKospi ? +(latestKospi.kospiPrice - previousKospi.kospiPrice).toFixed(2) : null,
      changePct: previousKospi ? +(((latestKospi.kospiPrice - previousKospi.kospiPrice) / previousKospi.kospiPrice) * 100).toFixed(2) : null,
    };
  }

  function getRenderableMarketSummary(market) {
    return mergeMarketSummary(
      market,
      mergeMarketSummary(getAverageHistoryMarketFallback(), { extras: latestMarketExtras }),
    );
  }

  function fitTextToWidth(el, { maxFontSize, minFontSize }) {
    if (!el) return;

    el.style.fontSize = `${maxFontSize}px`;
    el.classList.remove('autofit-wrap');

    if (!el.clientWidth) return;
    while (parseFloat(el.style.fontSize) > minFontSize && el.scrollWidth > el.clientWidth + 1) {
      el.style.fontSize = `${(parseFloat(el.style.fontSize) - 0.5).toFixed(1)}px`;
    }

    if (el.scrollWidth > el.clientWidth + 1) {
      el.classList.add('autofit-wrap');
    }
  }

  function applyAutoFitText(root = document) {
    const configs = [
      { selector: '.card .name, .overview-card .name', maxFontSize: 14, minFontSize: 11 },
      { selector: '.overview-rank-name', maxFontSize: 11.5, minFontSize: 9.5 },
      { selector: '.price-label', maxFontSize: 12, minFontSize: 9.5 },
    ];

    configs.forEach(config => {
      root.querySelectorAll(config.selector).forEach(el => fitTextToWidth(el, config));
    });
  }

    currentTheme = theme === 'light' ? 'light' : 'dark';

    if (persist) {

  function normalizeMarketExtras(extras = []) {
    const byId = new Map();
    extras.forEach(metric => {
      if (!metric || !metric.id) return;
      const spec = MARKET_EXTRA_SPECS.find(item => item.id === metric.id) || {};
      byId.set(metric.id, {
        ...spec,
        ...metric,
        name: metric.name || spec.name || metric.id,
        unit: metric.unit != null ? metric.unit : (spec.unit || ''),
      });
    });
    return MARKET_EXTRA_SPECS.map(spec => byId.get(spec.id) || {
      ...spec,
      price: null,
      change: null,
      changePct: null,
      marketStatus: null,
    });
  }

  function hasMarketMetricValue(metric) {
    return metric && metric.price != null && !Number.isNaN(metric.price);
  }

  function mergeMarketExtras(primaryExtras = [], fallbackExtras = [], preservedExtras = []) {
    const primary = normalizeMarketExtras(primaryExtras);
    const fallback = normalizeMarketExtras(fallbackExtras);
    const preserved = normalizeMarketExtras(preservedExtras);

    return MARKET_EXTRA_SPECS.map(spec => {
      const candidates = [
        primary.find(metric => metric.id === spec.id),
        fallback.find(metric => metric.id === spec.id),
        preserved.find(metric => metric.id === spec.id),
      ];
      return candidates.find(hasMarketMetricValue)
        || candidates.find(Boolean)
        || {
          ...spec,
          price: null,
          change: null,
          changePct: null,
          marketStatus: null,
        };
    });
  }

  function mergeMarketSummary(primaryMarket, fallbackMarket) {
    if (!primaryMarket && !fallbackMarket) return null;
    const primary = primaryMarket || {};
    const fallback = fallbackMarket || {};

    return {
      ...fallback,
      ...primary,
      extras: mergeMarketExtras(primary.extras || [], fallback.extras || [], latestMarketExtras),
    };
  }

  async function loadPairConfig() {
    try {
      const resp = await fetch('config.json?t=' + Date.now());
      if (!resp.ok) return pairConfigMap;
      const config = await resp.json();
      pairConfigMap = new Map(config.map(item => [item.id, item]));
    } catch (e) {
      // config.json 로드 실패 시 실시간 강제 갱신은 건너뛴다.
    }
    return pairConfigMap;
  }

  function buildTodaySummaryFromPairs(marketOverride = null) {
    const representatives = getRepresentativePairs().filter(pair => pair.current.spread != null);
    if (!representatives.length) return null;

    const market = getRenderableMarketSummary(marketOverride);
    const averageSpread = representatives.reduce((sum, pair) => sum + pair.current.spread, 0) / representatives.length;
    const changeValues = representatives
      .map(pair => pair.current.spreadChange)
      .filter(value => value != null && !Number.isNaN(value));
    const averageSpreadChange = changeValues.length
      ? changeValues.reduce((sum, value) => sum + value, 0) / changeValues.length
      : null;
    const commonChangeValues = representatives
      .map(pair => pair.current.commonChange)
      .filter(value => value != null && !Number.isNaN(value));
    const preferredChangeValues = representatives
      .map(pair => pair.current.preferredChange)
      .filter(value => value != null && !Number.isNaN(value));

    const topWideningRanked = representatives
      .filter(pair => pair.current.spreadChange > 0)
      .sort((a, b) => b.current.spreadChange - a.current.spreadChange);
    const topNarrowingRanked = representatives
      .filter(pair => pair.current.spreadChange < 0)
      .sort((a, b) => a.current.spreadChange - b.current.spreadChange);

    return {
      source: '기본 데이터 기준',
      market,
      representativeCount: representatives.length,
      averageSpread: +averageSpread.toFixed(2),
      averageSpreadChange: averageSpreadChange == null ? null : +averageSpreadChange.toFixed(2),
      averageCommonChange: commonChangeValues.length
        ? +(commonChangeValues.reduce((sum, value) => sum + value, 0) / commonChangeValues.length).toFixed(2)
        : null,
      averagePreferredChange: preferredChangeValues.length
        ? +(preferredChangeValues.reduce((sum, value) => sum + value, 0) / preferredChangeValues.length).toFixed(2)
        : null,
      topWidening: topWideningRanked[0] ? serializePairSummary(topWideningRanked[0]) : null,
      topWideningRunners: topWideningRanked.slice(1, 5).map(serializePairSummary),
      topNarrowing: topNarrowingRanked[0] ? serializePairSummary(topNarrowingRanked[0]) : null,
      topNarrowingRunners: topNarrowingRanked.slice(1, 5).map(serializePairSummary),
    };
  }

    const groupItems = items || getGroupItemsByPairId(pair?.id) || (pair ? [{ pair }] : []);
    return {

        ${renderPriceLine(labels.preferred, `${formatPrice(c.preferredPrice)} ${fmtChange(c.preferredChange)}`)}

    }).join('');

    return `<div class="prices">
      ${renderPriceLine(labels.common, `${formatPrice(c.commonPrice)} ${fmtChange(c.commonChange)}`)}

  function serializePairSummary(pair) {
    return {
      id: pair.id,
      name: pair.name,
      spread: pair.current.spread,
      spreadChange: pair.current.spreadChange,
    };
  }

  function formatPairName(name) {
    return String(name).replace('/', ' ');
  }

  function formatMarketPrice(value) {
    if (value == null || Number.isNaN(value)) return '-';
    return value.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatCompactMetricValue(metric) {
    if (!metric || metric.price == null || Number.isNaN(metric.price)) return '-';
    const decimals = metric.priceDecimals == null ? 2 : metric.priceDecimals;
    return metric.price.toLocaleString('ko-KR', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals,
    });
  }

  function getDirectionClass(value) {
    if (value == null || Number.isNaN(value) || Math.abs(value) < 0.005) return 'flat';
    return value > 0 ? 'up' : 'down';
  }

  function getTextColorClass(value) {
    return getDirectionClass(value) + '-color';
  }

  function formatPercentChange(value) {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    if (direction === 'flat') return `${Math.abs(value).toFixed(2)}%`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${Math.abs(value).toFixed(2)}%`;
  }

  function formatSignedPoints(value, suffix = '') {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    const formatted = Math.abs(value).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (direction === 'flat') return `${formatted}${suffix}`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${formatted}${suffix}`;
  }

  function parseDirectionalNumber(value) {
    if (typeof value === 'number') return value;
    const text = String(value);
    const match = text.match(/-?\d+(?:\.\d+)?/);
    if (!match) return null;
    const parsed = parseFloat(match[0]);
    if (text.includes('▼')) return -Math.abs(parsed);
    if (text.includes('▲')) return Math.abs(parsed);
    return parsed;
  }

  function formatPointChange(value) {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    if (direction === 'flat') return `${Math.abs(value).toFixed(2)}%p`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${Math.abs(value).toFixed(2)}%p`;
  }

  // --- Cards ---
  function renderCards() {
    const cardGroups = getCardGroups();
    const el = document.getElementById('cards');
    el.innerHTML = cardGroups.map(items => {
      const top = items[0];
      const p = top.pair;
      const c = p.current;
      const primaryIdx = top.idx;
      const isActive = items.some(item => item.idx === selectedIdx);

      if (p.isAverage) {
        const dir = getDirectionClass(c.spreadChange);
        return `<div class="card avg-card${isActive ? ' active' : ''}" data-idx="${primaryIdx}">
          <div class="name">${p.name}</div>
          <div class="spread-line">
            <div class="spread-val">${c.spread.toFixed(1)}%</div>
            <div class="spread-change ${dir}">${formatPointChange(c.spreadChange)}</div>
          </div>
        </div>`;
      }

      return `<div class="card${isActive ? ' active' : ''}" data-idx="${primaryIdx}">
        ${renderGroupSnapshot(items)}
      </div>`;
    }).join('');
    el.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        selectPair(parseInt(card.dataset.idx, 10));
      });
    });
    applyAutoFitText(el);
  }

  // --- Table ---
  function renderTable() {
    // Show only the highest-spread pair per group
    const cardGroups = getCardGroups();
    const tablePairs = cardGroups.map(items => items[0].pair);
    const maxSpread = Math.max(...tablePairs.filter(p => !p.isAverage).map(p => p.current.spread));

    document.getElementById('tableBody').innerHTML = tablePairs.map(p => {
      const c = p.current;
      const textColorClass = getTextColorClass(c.spreadChange);
      const barW = (c.spread / maxSpread * 100).toFixed(1);
      if (p.isAverage) {
        return `<tr style="border-top:2px solid var(--accent);border-bottom:2px solid var(--accent);background:var(--surface2)">
          <td><strong>${p.name}</strong></td>
          <td class="numeric"></td>
          <td class="numeric"></td>
          <td class="numeric"><strong>${c.spread.toFixed(2)}%</strong></td>
          <td class="numeric ${textColorClass}">${formatPointChange(c.spreadChange)}</td>
          <td class="numeric"><div class="bar-cell"><div class="bar" style="width:${barW}%;background:var(--green)"></div>${c.spread.toFixed(1)}%</div></td>
        </tr>`;
      }
      const displayName = p.name.includes('/') ? p.commonName : p.name;
      return `<tr>
        <td><strong>${displayName}</strong></td>
        <td class="numeric">${formatPrice(c.commonPrice)}</td>
        <td class="numeric">${formatPrice(c.preferredPrice)}</td>
        <td class="numeric"><strong>${c.spread.toFixed(2)}%</strong></td>
        <td class="numeric ${textColorClass}">${formatPointChange(c.spreadChange)}</td>
        <td class="numeric"><div class="bar-cell"><div class="bar" style="width:${barW}%"></div>${c.spread.toFixed(1)}%</div></td>
      </tr>`;
    }).join('');
  }

  // --- Stats ---
  function renderStats() {
    const p = pairs[selectedIdx];
    const hist = getFilteredHistory(p);
    const spreads = hist.map(h => h.spread);
    const min = Math.min(...spreads);
    const max = Math.max(...spreads);
    const avg = spreads.reduce((a, b) => a + b, 0) / spreads.length;
    const current = p.current.spread;

    // Percentile
    const sorted = [...spreads].sort((a, b) => a - b);
    const rank = sorted.filter(s => s <= current).length;
    const percentile = (rank / sorted.length * 100).toFixed(0);

    const statsEl = document.getElementById('statsRow');
    statsEl.innerHTML = `
      <div class="stat-box"><div class="label">현재 괴리율</div><div class="value">${current.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">평균</div><div class="value">${avg.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">최저</div><div class="value">${min.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">최고</div><div class="value">${max.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">백분위</div><div class="value">${percentile}%</div></div>
      <div class="stat-box"><div class="label">데이터 수</div><div class="value">${hist.length}일</div></div>
    `;
  }

  // --- Chart ---
  function renderChart() {
    const p = pairs[selectedIdx];
    const theme = getChartTheme();
    document.getElementById('chartTitle').textContent = p.name + ' 괴리율 추이';

    const canvas = document.getElementById('chart');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    const hist = getFilteredHistory(p);
    if (hist.length < 2) return;

    const spreads = hist.map(h => h.spread);
    const minS = Math.min(...spreads);
    const maxS = Math.max(...spreads);
    const rangeS = maxS - minS || 1;
    const avg = spreads.reduce((a, b) => a + b, 0) / spreads.length;

    const pad = { top: 20, right: 16, bottom: 36, left: 56 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;

    // Clear
    ctx.clearRect(0, 0, W, H);

    // Y axis grid
    ctx.strokeStyle = theme.grid;
    ctx.lineWidth = 1;
    const yTicks = 5;
    ctx.font = '12px -apple-system, sans-serif';
    ctx.fillStyle = theme.textDim;
    ctx.textAlign = 'right';
    for (let i = 0; i <= yTicks; i++) {
      const v = minS + (rangeS * i / yTicks);
      const y = pad.top + cH - (cH * i / yTicks);
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
      ctx.fillText(v.toFixed(1) + '%', pad.left - 8, y + 4);
    }

    // Average line
    const avgY = pad.top + cH - ((avg - minS) / rangeS * cH);
    ctx.strokeStyle = theme.avgLine;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.left, avgY);
    ctx.lineTo(W - pad.right, avgY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = theme.avgLabel;
    ctx.textAlign = 'left';
    ctx.fillText('평균 ' + avg.toFixed(1) + '%', pad.left + 4, avgY - 6);

    // X axis labels
    ctx.fillStyle = theme.textDim;
    ctx.textAlign = 'center';
    const xLabelCount = Math.min(6, hist.length);
    for (let i = 0; i < xLabelCount; i++) {
      const idx = Math.floor(i * (hist.length - 1) / (xLabelCount - 1));
      const x = pad.left + (idx / (hist.length - 1)) * cW;
      ctx.fillText(hist[idx].date.slice(2), x, H - pad.bottom + 20);
    }

    // Gradient fill
    const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
    gradient.addColorStop(0, 'rgba(108,140,255,0.25)');
    gradient.addColorStop(1, 'rgba(108,140,255,0.0)');

    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].spread - minS) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    const lastX = pad.left + cW;
    ctx.lineTo(lastX, pad.top + cH);
    ctx.lineTo(pad.left, pad.top + cH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // Line
    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].spread - minS) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = theme.accent;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Tooltip interaction
    const tooltip = document.getElementById('tooltip');
    canvas.onmousemove = function(e) {
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + cH) {
        tooltip.classList.remove('visible');
        return;
      }
      const ratio = (mx - pad.left) / cW;
      const idx = Math.round(ratio * (hist.length - 1));
      const d = hist[idx];
      if (!d) return;

      const dotX = pad.left + (idx / (hist.length - 1)) * cW;
      const dotY = pad.top + cH - ((d.spread - minS) / rangeS * cH);

      // Draw dot
      renderChart._raf && cancelAnimationFrame(renderChart._raf);
      renderChart._raf = requestAnimationFrame(() => {
        renderChart._lastCtx = ctx;
      });

      tooltip.innerHTML = `
        <div class="tt-date">${d.date}</div>
        <div class="tt-row"><span>보통주</span><span>${formatPrice(d.commonPrice)}</span></div>
        <div class="tt-row"><span>우선주</span><span>${formatPrice(d.preferredPrice)}</span></div>
        <div class="tt-row"><span><strong>괴리율</strong></span><span><strong>${d.spread.toFixed(2)}%</strong></span></div>
      `;

      let tx = dotX + 12;
      let ty = dotY - 60;
      if (tx + 180 > W) tx = dotX - 180;
      if (ty < 0) ty = dotY + 12;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    };
    canvas.onmouseleave = function() {
      tooltip.classList.remove('visible');
    };
  }

  // --- Price Chart ---
  function renderPriceChart() {
    const p = pairs[selectedIdx];
    const isAvg = !!p.isAverage;
    const hist = getFilteredHistory(p);
    const theme = getChartTheme();
    const detailLabels = isAvg ? null : getDetailLabels(p);
    if (hist.length < 2) return;

    // Title & legend
    const titleEl = document.getElementById('priceChartTitle');
    const legendEl = document.getElementById('priceLegend');
    if (isAvg) {
      titleEl.textContent = 'KOSPI 지수 추이';
      legendEl.innerHTML = '<span class="leg-kospi">KOSPI</span>';
    } else {
      titleEl.textContent = p.name + ' 시세 추이';
      legendEl.innerHTML = `<span class="leg-common">${detailLabels.common}</span><span class="leg-preferred">${detailLabels.preferred}</span>`;
    }

    const canvas = document.getElementById('priceChart');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    // Canvas height = container height minus title/legend area
    const legendBottom = legendEl.getBoundingClientRect().bottom;
    const canvasH = rect.bottom - legendBottom;
    canvas.width = rect.width * dpr;
    canvas.height = canvasH * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = canvasH + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = canvasH;

    const pad = { top: 16, right: 16, bottom: 32, left: 56 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;

    ctx.clearRect(0, 0, W, H);

    if (isAvg) {
      // Single line: KOSPI
      const prices = hist.map(h => h.kospiPrice).filter(v => v != null);
      if (prices.length < 2) return;
      const kospiHist = hist.filter(h => h.kospiPrice != null);
      const minP = 0;
      const maxP = Math.max(...prices);
      const rangeP = maxP || 1;

      drawYAxis(ctx, pad, cW, cH, W, minP, maxP, rangeP, '', 'left');
      drawXAxis(ctx, pad, cH, cW, H, kospiHist);
      drawLine(ctx, pad, cW, cH, kospiHist, d => d.kospiPrice, minP, rangeP, theme.green, true);

      // Tooltip
      setupPriceTooltip(canvas, pad, W, cW, cH, kospiHist, (d) => {
        return `<div class="tt-date">${d.date}</div>
          <div class="tt-row"><span>KOSPI</span><span>${d.kospiPrice.toLocaleString('ko-KR')}</span></div>`;
      }, d => d.kospiPrice, minP, rangeP);
    } else {
      // Single shared axis: min=0, max from both series
      const allPrices = hist.flatMap(h => [h.commonPrice, h.preferredPrice]);
      const minP = 0;
      const maxP = Math.max(...allPrices);
      const rangeP = maxP || 1;

      drawYAxis(ctx, pad, cW, cH, W, minP, maxP, rangeP, '', 'left');
      drawXAxis(ctx, pad, cH, cW, H, hist);
      drawLine(ctx, pad, cW, cH, hist, d => d.commonPrice, minP, rangeP, theme.accent, false);
      drawLine(ctx, pad, cW, cH, hist, d => d.preferredPrice, minP, rangeP, theme.up, false);

      // Tooltip
      setupPriceTooltip(canvas, pad, W, cW, cH, hist, (d) => {
        return `<div class="tt-date">${d.date}</div>
          <div class="tt-row"><span>${detailLabels.common}</span><span>${formatPrice(d.commonPrice)}</span></div>
          <div class="tt-row"><span>${detailLabels.preferred}</span><span>${formatPrice(d.preferredPrice)}</span></div>
          <div class="tt-row"><span><strong>괴리율</strong></span><span><strong>${d.spread.toFixed(2)}%</strong></span></div>`;
      }, d => d.commonPrice, minP, rangeP);
    }
  }

  function drawYAxis(ctx, pad, cW, cH, W, minV, maxV, range, suffix, side, color) {
    const theme = getChartTheme();
    const yTicks = 4;
    ctx.font = '11px -apple-system, sans-serif';
    for (let i = 0; i <= yTicks; i++) {
      const v = minV + (range * i / yTicks);
      const y = pad.top + cH - (cH * i / yTicks);
      // Grid line (only draw once, from left axis)
      if (side === 'left') {
        ctx.strokeStyle = theme.grid;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();
      }
      ctx.fillStyle = color || theme.textDim;
      if (side === 'left') {
        ctx.textAlign = 'right';
        ctx.fillText(formatAxisPrice(v) + suffix, pad.left - 8, y + 4);
      } else {
        ctx.textAlign = 'left';
        ctx.fillText(formatAxisPrice(v) + suffix, W - pad.right + 8, y + 4);
      }
    }
  }

  function drawXAxis(ctx, pad, cH, cW, H, hist) {
    ctx.fillStyle = getChartTheme().textDim;
    ctx.textAlign = 'center';
    ctx.font = '11px -apple-system, sans-serif';
    const xLabelCount = Math.min(6, hist.length);
    for (let i = 0; i < xLabelCount; i++) {
      const idx = Math.floor(i * (hist.length - 1) / (xLabelCount - 1));
      const x = pad.left + (idx / (hist.length - 1)) * cW;
      ctx.fillText(hist[idx].date.slice(2), x, pad.top + cH + 20);
    }
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function drawLine(ctx, pad, cW, cH, hist, getValue, minV, range, color, fill) {
    if (fill) {
      const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
      gradient.addColorStop(0, hexToRgba(color, 0.18));
      gradient.addColorStop(1, hexToRgba(color, 0.0));
      ctx.beginPath();
      for (let i = 0; i < hist.length; i++) {
        const x = pad.left + (i / (hist.length - 1)) * cW;
        const y = pad.top + cH - ((getValue(hist[i]) - minV) / range * cH);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.lineTo(pad.left + cW, pad.top + cH);
      ctx.lineTo(pad.left, pad.top + cH);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
    }
    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((getValue(hist[i]) - minV) / range * cH);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function setupPriceTooltip(canvas, pad, W, cW, cH, hist, htmlFn, getValue, minV, range) {
    const tooltip = document.getElementById('priceTooltip');
    canvas.onmousemove = function(e) {
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + cH) {
        tooltip.classList.remove('visible');
        return;
      }
      const ratio = (mx - pad.left) / cW;
      const idx = Math.round(ratio * (hist.length - 1));
      const d = hist[idx];
      if (!d) return;

      tooltip.innerHTML = htmlFn(d);

      const dotX = pad.left + (idx / (hist.length - 1)) * cW;
      const dotY = pad.top + cH - ((getValue(d) - minV) / range * cH);
      let tx = dotX + 12;
      let ty = dotY - 60;
      if (tx + 180 > W) tx = dotX - 180;
      if (ty < 0) ty = dotY + 12;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    };
    canvas.onmouseleave = function() {
      tooltip.classList.remove('visible');
    };
  }

  function formatAxisPrice(n) {
    if (n >= 10000) return (n / 10000).toFixed(n >= 100000 ? 0 : 1) + '만';
    if (n >= 1000) return Math.round(n).toLocaleString('ko-KR');
    return n.toFixed(n < 10 ? 2 : 0);
  }

  // --- Period buttons ---
  function bindPeriodBtns() {
    document.getElementById('periodBtns').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      periodDays = parseInt(e.target.dataset.days);
      renderChart();
      renderPriceChart();
      renderStats();
    });
  }

  // --- Helpers ---
  function getFilteredHistory(pair) {
    const hist = pair.history;
    if (periodDays === 0) return hist;
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - periodDays);
    const cutStr = cutoff.toISOString().slice(0, 10);
    return hist.filter(h => h.date >= cutStr);
  }

  function formatPrice(n) {
    return n.toLocaleString('ko-KR');
  }

  function fmtChange(v) {
    if (v == null) return '';
    const direction = getDirectionClass(v);
    const cls = getTextColorClass(v);
    if (direction === 'flat') {
      return `<span class="${cls} change-value">&nbsp;${Math.abs(v).toFixed(1)}%</span>`;
    }
    const arrow = direction === 'up' ? '▲' : '▼';
    return `<span class="${cls} change-value">${arrow}${Math.abs(v).toFixed(1)}%</span>`;
  }

  // Resize
  window.addEventListener('resize', () => {
    applyAutoFitText();
    renderChart();
    renderPriceChart();
  });

  // --- Live price updates from current.json ---
  function getPrevDaySpread(pair, today) {
    for (let i = pair.history.length - 1; i >= 0; i--) {
      if (pair.history[i].date < today) return pair.history[i].spread;
    }
    return null;
  }

  function parseSnapshotTimestamp(timestamp) {
    if (!timestamp) return null;
    const normalized = String(timestamp).includes('T')
      ? String(timestamp)
      : String(timestamp).replace(' ', 'T');
    const withTimezone = /([+-]\d{2}:\d{2}|Z)$/.test(normalized)
      ? normalized
      : normalized + '+09:00';
    const parsed = new Date(withTimezone);
    return Number.isNaN(parsed.getTime()) ? null : parsed;
  }

  function formatKstTimestamp(value) {
    const parsed = value instanceof Date ? value : parseSnapshotTimestamp(value);
    if (!parsed) return '';

    const parts = new Intl.DateTimeFormat('sv-SE', {
      timeZone: 'Asia/Seoul',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false,
    }).formatToParts(parsed);
    const partMap = Object.fromEntries(parts.map(part => [part.type, part.value]));
    return `${partMap.year}-${partMap.month}-${partMap.day} ${partMap.hour}:${partMap.minute}:${partMap.second}`;
  }

  function isSnapshotMsStale(timestampMs, maxAgeMs = LIVE_REFRESH_MAX_AGE_MS) {
    if (!timestampMs) return true;
    return Date.now() - timestampMs > maxAgeMs;
  }

  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function setRefreshButtonState(isBusy) {
    refreshButtonBusy = isBusy;
    const refreshBtn = document.getElementById('refreshBtn');
    if (!refreshBtn) return;
    refreshBtn.disabled = isBusy;
    refreshBtn.textContent = isBusy ? '갱신 중...' : '새로 고침';
  }

  function bindRefreshButton() {
    const refreshBtn = document.getElementById('refreshBtn');
    if (!refreshBtn) return;
    refreshBtn.addEventListener('click', async () => {
      if (refreshButtonBusy) return;
      setRefreshButtonState(true);
      try {
        await fetchCurrentPrices({ forceLiveRefresh: true });
      } finally {
        setRefreshButtonState(false);
      }
    });
  }

  function getTickerCode(ticker) {
    return String(ticker || '').split('.')[0];
  }

  function parseRawNumber(value) {
    if (value == null || value === '') return null;
    const parsed = parseFloat(String(value).replace(/,/g, ''));
    return Number.isNaN(parsed) ? null : parsed;
  }

  async function fetchLiveJson(url) {
    const resp = await fetch(LIVE_PROXY_URL + encodeURIComponent(url));
    if (!resp.ok) {
      throw new Error(`실시간 조회 실패 (${resp.status})`);
    }
    return resp.json();
  }

  async function fetchLiveText(url) {
    const resp = await fetch(LIVE_PROXY_URL + encodeURIComponent(url));
    if (!resp.ok) {
      throw new Error(`실시간 조회 실패 (${resp.status})`);
    }
    return resp.text();
  }

  async function mapWithConcurrency(items, limit, mapper) {
    const results = new Array(items.length);
    let nextIndex = 0;

    async function worker() {
      while (true) {
        const currentIndex = nextIndex;
        nextIndex += 1;
        if (currentIndex >= items.length) return;
        results[currentIndex] = await mapper(items[currentIndex], currentIndex);
      }
    }

    const workerCount = Math.min(limit, items.length);
    await Promise.all(Array.from({ length: workerCount }, () => worker()));
    return results;
  }

  function buildLiveMarketMetric(quote, defaults = {}) {
    if (!quote) return null;
    return {
      id: defaults.id || quote.itemCode || quote.symbolCode || quote.reutersCode,
      name: defaults.name || quote.stockName || quote.indexName || defaults.id,
      price: parseRawNumber(quote.closePriceRaw || quote.closePrice),
      change: parseRawNumber(quote.compareToPreviousClosePriceRaw || quote.compareToPreviousClosePrice),
      changePct: parseRawNumber(quote.fluctuationsRatioRaw || quote.fluctuationsRatio),
      marketStatus: quote.marketStatus || null,
      unit: defaults.unit || '',
      priceDecimals: defaults.priceDecimals == null ? 2 : defaults.priceDecimals,
    };
  }

  function extractMarketIndexMetricFromHtml(html, headClass, defaults = {}) {
    if (!html) return null;
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const link = doc.querySelector(`a.head.${headClass}`);
    const item = link ? link.closest('li') : null;
    if (!item) return null;

    const headInfo = item.querySelector('.head_info');
    const price = parseRawNumber(headInfo?.querySelector('.value')?.textContent);
    const rawChange = parseRawNumber(headInfo?.querySelector('.change')?.textContent);
    if (price == null || rawChange == null) return null;

    let signedChange = rawChange;
    if (headInfo?.classList.contains('point_up')) {
      signedChange = Math.abs(rawChange);
    } else if (headInfo?.classList.contains('point_dn')) {
      signedChange = -Math.abs(rawChange);
    } else if (headInfo?.classList.contains('point_eq')) {
      signedChange = 0;
    }

    const previousPrice = price - signedChange;
    const changePct = previousPrice ? +((signedChange / previousPrice) * 100).toFixed(2) : null;

    return {
      id: defaults.id,
      name: defaults.name,
      price: +price.toFixed(2),
      change: +signedChange.toFixed(2),
      changePct,
      marketStatus: null,
      unit: defaults.unit || '',
      priceDecimals: defaults.priceDecimals == null ? 2 : defaults.priceDecimals,
    };
  }

  function buildLiveMarketSummary(marketQuote, extras = []) {
    if (!marketQuote && !extras.length) return null;
    const summary = buildLiveMarketMetric(marketQuote, { id: 'KOSPI', name: '코스피' }) || {
      id: 'KOSPI',
      name: '코스피',
      price: null,
      change: null,
      changePct: null,
      marketStatus: null,
    };
    if (extras.length) {
      summary.extras = extras;
    }
    return summary;
  }

  async function buildLiveSnapshot() {
    await configLoadPromise;
    if (!pairConfigMap.size) {
      throw new Error('config.json을 불러오지 못했습니다.');
    }

    const uniqueCodes = [...new Set(
      [...pairConfigMap.values()].flatMap(item => [
        getTickerCode(item.commonTicker),
        getTickerCode(item.preferredTicker),
      ]).filter(Boolean)
    )];

    const quoteEntries = await mapWithConcurrency(uniqueCodes, LIVE_FETCH_CONCURRENCY, async code => {
      try {
        const payload = await fetchLiveJson(`https://polling.finance.naver.com/api/realtime/domestic/stock/${code}`);
        return [code, payload.datas?.[0] || null];
      } catch (e) {
        return [code, null];
      }
    });
    const quoteMap = new Map(quoteEntries.filter(([, quote]) => quote));

    const [marketPayload, kosdaqPayload, sp500Payload, marketIndexHtml] = await Promise.all([
      fetchLiveJson('https://polling.finance.naver.com/api/realtime/domestic/index/KOSPI').catch(() => null),
      fetchLiveJson('https://polling.finance.naver.com/api/realtime/domestic/index/KOSDAQ').catch(() => null),
      fetchLiveJson('https://polling.finance.naver.com/api/realtime/worldstock/index/.INX').catch(() => null),
      fetchLiveText('https://finance.naver.com/marketindex/').catch(() => null),
    ]);
    const marketQuote = marketPayload?.datas?.[0] || null;
    const marketExtras = [
      buildLiveMarketMetric(kosdaqPayload?.datas?.[0] || null, { id: 'KOSDAQ', name: 'KOSDAQ', priceDecimals: 2 }),
      extractMarketIndexMetricFromHtml(marketIndexHtml, 'usd', { id: 'USDKRW', name: '환율', unit: '원', priceDecimals: 2 }),
      extractMarketIndexMetricFromHtml(marketIndexHtml, 'gold_inter', { id: 'GOLD', name: '금가격 (COMEX)', unit: '', priceDecimals: 2 }),
      buildLiveMarketMetric(sp500Payload?.datas?.[0] || null, { id: 'SP500', name: 'S&P500', priceDecimals: 2 }),
    ].filter(Boolean);

    const prices = {};
    const tradedAtValues = [];
    for (const pair of pairs.filter(item => !item.isAverage)) {
      const config = pairConfigMap.get(pair.id);
      if (!config) continue;

      const commonQuote = quoteMap.get(getTickerCode(config.commonTicker));
      const preferredQuote = quoteMap.get(getTickerCode(config.preferredTicker));
      if (!commonQuote || !preferredQuote) continue;

      const commonPrice = parseRawNumber(commonQuote.closePriceRaw || commonQuote.closePrice);
      const preferredPrice = parseRawNumber(preferredQuote.closePriceRaw || preferredQuote.closePrice);
      const commonDelta = parseRawNumber(commonQuote.compareToPreviousClosePriceRaw || commonQuote.compareToPreviousClosePrice);
      const preferredDelta = parseRawNumber(preferredQuote.compareToPreviousClosePriceRaw || preferredQuote.compareToPreviousClosePrice);
      const previousCommonPrice = commonPrice != null && commonDelta != null ? commonPrice - commonDelta : null;
      const previousPreferredPrice = preferredPrice != null && preferredDelta != null ? preferredPrice - preferredDelta : null;
      const spread = commonPrice != null && commonPrice !== 0 && preferredPrice != null
        ? +(((commonPrice - preferredPrice) / commonPrice) * 100).toFixed(2)
        : null;
      const previousSpread = previousCommonPrice != null && previousCommonPrice !== 0 && previousPreferredPrice != null
        ? +(((previousCommonPrice - previousPreferredPrice) / previousCommonPrice) * 100).toFixed(2)
        : null;

      prices[pair.id] = {
        commonPrice,
        preferredPrice,
        spread,
        spreadChange: spread != null && previousSpread != null ? +(spread - previousSpread).toFixed(2) : null,
        commonChange: parseRawNumber(commonQuote.fluctuationsRatioRaw || commonQuote.fluctuationsRatio),
        preferredChange: parseRawNumber(preferredQuote.fluctuationsRatioRaw || preferredQuote.fluctuationsRatio),
      };

      if (commonQuote.localTradedAt) tradedAtValues.push(commonQuote.localTradedAt);
      if (preferredQuote.localTradedAt) tradedAtValues.push(preferredQuote.localTradedAt);
    }

    if (marketQuote?.localTradedAt) tradedAtValues.push(marketQuote.localTradedAt);
    const market = buildLiveMarketSummary(marketQuote, marketExtras);
    const parsedTimes = tradedAtValues
      .map(value => parseSnapshotTimestamp(value))
      .filter(Boolean);
    const latestTime = parsedTimes.length
      ? new Date(Math.max(...parsedTimes.map(value => value.getTime())))
      : new Date();

    if (!Object.keys(prices).length && !market) {
      throw new Error('실시간 시세를 가져오지 못했습니다.');
    }

    return {
      source: '네이버 증권 실시간',
      lastUpdated: formatKstTimestamp(latestTime),
      prices,
      market,
    };
  }

  function applyCurrentSnapshot(cur, fallbackSource = '네이버 증권') {
    const incomingSnapshotMs = parseSnapshotTimestamp(cur.lastUpdated)?.getTime() || 0;
    if (incomingSnapshotMs && latestAppliedSnapshotMs && incomingSnapshotMs < latestAppliedSnapshotMs) {
      return false;
    }

    const previousMarketSummary = todayOverviewData?.market || null;
    const incomingMarketSummary = mergeMarketSummary(cur.market || null, cur.summary?.market || null);
    const marketSummary = mergeMarketSummary(incomingMarketSummary, previousMarketSummary);
    const effectiveLastUpdated = cur.lastUpdated || formatKstTimestamp(new Date());
    const today = effectiveLastUpdated.slice(0, 10);

    pairs.forEach(p => {
      if (p.isAverage) return;
      const cp = cur.prices?.[p.id];
      if (!cp) return;

      p.current.commonPrice = cp.commonPrice;
      p.current.preferredPrice = cp.preferredPrice;
      p.current.spread = cp.spread;
      if (cp.commonChange != null) p.current.commonChange = cp.commonChange;
      if (cp.preferredChange != null) p.current.preferredChange = cp.preferredChange;
      if (cp.spreadChange != null) {
        p.current.spreadChange = cp.spreadChange;
      }

      const prev = getPrevDaySpread(p, today);
      if (cp.spreadChange == null && prev !== null) {
        p.current.spreadChange = +(cp.spread - prev).toFixed(2);
      }

      const last = p.history[p.history.length - 1];
      if (last && last.date === today) {
        last.commonPrice = cp.commonPrice;
        last.preferredPrice = cp.preferredPrice;
        last.spread = cp.spread;
      } else {
        p.history.push({
          date: today,
          commonPrice: cp.commonPrice,
          preferredPrice: cp.preferredPrice,
          spread: cp.spread,
        });
      }
    });

    const nextSummary = buildTodaySummaryFromPairs(marketSummary);

    const avgPair = getAveragePair();
    if (avgPair && (cur.averageSpread != null || nextSummary?.averageSpread != null)) {
      const prev = getPrevDaySpread(avgPair, today);
      const averageSpread = cur.averageSpread != null ? cur.averageSpread : nextSummary?.averageSpread;
      const averageSpreadChange = cur.averageSpreadChange != null
        ? cur.averageSpreadChange
        : nextSummary?.averageSpreadChange;

      avgPair.current.spread = averageSpread;
      if (averageSpreadChange != null) {
        avgPair.current.spreadChange = averageSpreadChange;
      } else if (prev !== null) {
        avgPair.current.spreadChange = +(averageSpread - prev).toFixed(2);
      }

      const last = avgPair.history[avgPair.history.length - 1];
      if (last && last.date === today) {
        last.spread = averageSpread;
        if (marketSummary?.price != null) last.kospiPrice = marketSummary.price;
      } else {
        const nextEntry = { date: today, commonPrice: 0, preferredPrice: 0, spread: averageSpread };
        if (marketSummary?.price != null) nextEntry.kospiPrice = marketSummary.price;
        avgPair.history.push(nextEntry);
      }
    }

    todayOverviewData = cur.summary
      ? {
          ...(nextSummary || {}),
          ...cur.summary,
          market: mergeMarketSummary(cur.summary.market || nextSummary?.market || null, marketSummary),
          source: cur.source || fallbackSource,
        }
      : {
          ...(nextSummary || {}),
          market: mergeMarketSummary(nextSummary?.market || null, marketSummary),
          source: cur.source || fallbackSource,
        };

    latestMarketExtras = mergeMarketExtras(
      todayOverviewData?.market?.extras || [],
      latestMarketExtras,
    );

    latestAppliedSnapshotMs = incomingSnapshotMs || Date.now();
    document.getElementById('lastUpdated').textContent = '최종 업데이트: ' + effectiveLastUpdated;
    renderTodayOverview();
    renderCards();
    renderTable();
    renderChart();
    renderPriceChart();
    renderStats();
    return true;
  }

  async function refreshLivePricesIfNeeded(baseSnapshot, { forceRefresh = false } = {}) {
    const baseSnapshotMs = parseSnapshotTimestamp(baseSnapshot?.lastUpdated)?.getTime() || 0;
    const referenceSnapshotMs = Math.max(baseSnapshotMs, latestAppliedSnapshotMs || 0);
    if (!forceRefresh && !isSnapshotMsStale(referenceSnapshotMs)) return false;
    if (liveRefreshPromise) {
      return liveRefreshPromise;
    }

    liveRefreshPromise = (async () => {
      try {
        const liveSnapshot = await buildLiveSnapshot();
        return applyCurrentSnapshot(liveSnapshot, '네이버 증권 실시간');
      } catch (e) {
        // 실시간 프록시 갱신 실패 시 기존 스냅샷을 유지한다.
        return false;
      } finally {
        liveRefreshPromise = null;
      }
    })();

    return liveRefreshPromise;
  }

  async function refreshLivePricesWithRetry(
    baseSnapshot,
    attempts = LIVE_REFRESH_RETRY_ATTEMPTS,
    options = {},
  ) {
    for (let attempt = 0; attempt < attempts; attempt += 1) {
      const refreshed = await refreshLivePricesIfNeeded(baseSnapshot, options);
      const hasFreshSnapshot = !isSnapshotMsStale(latestAppliedSnapshotMs || 0);
      if (refreshed || (!options.forceRefresh && hasFreshSnapshot)) {
        return refreshed;
      }
      if (attempt < attempts - 1) {
        await delay(LIVE_REFRESH_RETRY_DELAY_MS);
      }
    }
    return false;
  }

  async function fetchCurrentPrices({ forceLiveRefresh = false } = {}) {
    let baseSnapshot = {
      source: 'data.js',
      lastUpdated: STOCK_DATA.lastUpdated,
    };

    try {
      const resp = await fetch('current.json?t=' + Date.now());
      if (resp.ok) {
        const cur = await resp.json();
        applyCurrentSnapshot(cur, cur.source || '네이버 증권');
        baseSnapshot = cur;
      }
    } catch (e) {
      // current.json 로드 실패 시 data.js 기준으로 실시간 조회만 시도한다.
    }

    await refreshLivePricesWithRetry(baseSnapshot, LIVE_REFRESH_RETRY_ATTEMPTS, {
      forceRefresh: forceLiveRefresh,
    });
  }

  bindRefreshButton();
  fetchCurrentPrices();
})();
</script>
