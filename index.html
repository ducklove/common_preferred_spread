<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우선주 괴리율 대시보드</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e4e7f1;
  --text-dim: #8b90a5;
  --accent: #6c8cff;
  --up: #f0615e;
  --down: #4a90d9;
  --green: #38c96a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
.header {
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header .updated {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 32px;
}

/* Today overview */
.today-overview {
  background:
    radial-gradient(circle at top right, rgba(108,140,255,0.18), transparent 36%),
    linear-gradient(135deg, rgba(108,140,255,0.12), rgba(56,201,106,0.08)),
    var(--surface);
  border: 1px solid rgba(108,140,255,0.35);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 24px;
}
.today-overview-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.today-overview-kicker {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.today-overview-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.today-overview-meta {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
}
.today-overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.overview-card {
  background: rgba(15,17,23,0.38);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px;
  min-height: 126px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 8px;
}
.overview-card.clickable {
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
}
.overview-card.clickable:hover {
  border-color: var(--accent);
  background: rgba(15,17,23,0.54);
  transform: translateY(-1px);
}
.overview-card.active {
  border-color: var(--accent);
  background: rgba(108,140,255,0.1);
}
.overview-card.primary {
  background: rgba(15,17,23,0.26);
  border-color: rgba(56,201,106,0.28);
}
.overview-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.overview-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.8px;
}
.overview-card.leader-card .overview-value {
  font-size: 21px;
  line-height: 1.25;
  letter-spacing: -0.4px;
}
.overview-change {
  font-size: 14px;
  font-weight: 600;
}
.overview-change.up { color: var(--up); }
.overview-change.down { color: var(--down); }
.overview-change.flat { color: var(--text-dim); }
.overview-detail {
  font-size: 12px;
  color: var(--text-dim);
}
.overview-points {
  font-size: 12px;
  color: var(--text-dim);
}
.overview-summary-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: auto;
}
.overview-stat {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 10px;
}
.overview-stat-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.overview-stat-value {
  font-size: 15px;
  font-weight: 700;
}

/* Summary cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.card:hover { border-color: var(--accent); }
.card.avg-card { border-color: var(--green); background: rgba(56,201,106,0.06); }
.card.avg-card.active { border-color: var(--green); background: rgba(56,201,106,0.12); }
.card.active {
  border-color: var(--accent);
  background: var(--surface2);
}
.card .name,
.overview-card .name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card .spread-val,
.overview-card .spread-val {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -1px;
}
.card .spread-change,
.overview-card .spread-change {
  font-size: 13px;
  margin-top: 2px;
}
.card .spread-change.up { color: var(--up); }
.card .spread-change.down { color: var(--down); }
.card .spread-change.flat { color: var(--text-dim); }
.overview-card .spread-change.up { color: var(--up); }
.overview-card .spread-change.down { color: var(--down); }
.overview-card .spread-change.flat { color: var(--text-dim); }
.card .prices,
.overview-card .prices {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.card .div-yield {
  color: var(--green);
  font-weight: 600;
}
.card .div-info,
.overview-card .div-info {
  color: var(--green);
  font-size: 11px;
  margin-top: 2px;
}

/* Chart area */
.chart-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
}
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.chart-title {
  font-size: 17px;
  font-weight: 600;
}
.period-btns {
  display: flex;
  gap: 4px;
}
.period-btns button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.period-btns button:hover { border-color: var(--accent); color: var(--text); }
.period-btns button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.chart-container {
  position: relative;
  width: 100%;
  height: 380px;
}
canvas { display: block; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.stat-box .label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-box .value {
  font-size: 20px;
  font-weight: 700;
}

/* Comparison table */
.table-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.table-section h2 {
  font-size: 17px;
  font-weight: 600;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 10px 16px;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
tr:last-child td { border-bottom: none; }
tr:hover { background: var(--surface2); }
.up-color { color: var(--up); }
.down-color { color: var(--down); }
.flat-color { color: var(--text-dim); }

/* Bar in table */
.bar-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}
.bar {
  height: 8px;
  border-radius: 4px;
  background: var(--accent);
  transition: width 0.3s;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  min-width: 160px;
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-date { color: var(--text-dim); margin-bottom: 6px; }
.tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }

/* Price chart */
.price-chart-container {
  position: relative;
  width: 100%;
  height: 250px;
  margin-top: 16px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.price-chart-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.price-legend {
  display: flex;
  gap: 16px;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text-dim);
}
.price-legend span::before {
  content: '';
  display: inline-block;
  width: 12px;
  height: 3px;
  margin-right: 4px;
  vertical-align: middle;
  border-radius: 2px;
}
.price-legend .leg-common::before { background: #6c8cff; }
.price-legend .leg-preferred::before { background: #f0615e; }
.price-legend .leg-kospi::before { background: #38c96a; }

@media (max-width: 768px) {
  .header, .container { padding-left: 16px; padding-right: 16px; }
  .today-overview-title { font-size: 20px; }
  .cards { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .chart-container { height: 280px; }
  .price-chart-container { height: 200px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>우선주 괴리율 대시보드</h1>
  <div class="updated" id="lastUpdated"></div>
</div>

<div class="container">
  <div class="today-overview" id="todayOverview"></div>
  <div class="cards" id="cards"></div>

  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title" id="chartTitle">삼성전자 괴리율 추이</div>
      <div class="period-btns" id="periodBtns">
        <button data-days="30">1M</button>
        <button data-days="90">3M</button>
        <button data-days="180">6M</button>
        <button data-days="365">1Y</button>
        <button data-days="0" class="active">전체</button>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="chart"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="price-chart-container">
      <div class="price-chart-title" id="priceChartTitle">시세 추이</div>
      <div class="price-legend" id="priceLegend"></div>
      <canvas id="priceChart"></canvas>
      <div class="tooltip" id="priceTooltip"></div>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="table-section">
    <h2>종목 비교</h2>
    <table>
      <thead>
        <tr>
          <th>종목</th>
          <th>보통주</th>
          <th>우선주</th>
          <th>현재 괴리율</th>
          <th>변동</th>
          <th style="min-width:120px">괴리율</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script src="data.js"></script>
<script>
(function() {
  const pairs = STOCK_DATA.pairs;
  let selectedIdx = 0;
  let periodDays = 0; // 0 = all
  let todayOverviewData = buildTodaySummaryFromPairs();

  function getCardGroups() {
    const map = new Map();
    pairs.forEach((p, i) => {
      if (p.isAverage) {
        map.set('__avg__', [{ pair: p, idx: i }]);
        return;
      }
      const key = p.commonName;
      if (!map.has(key)) map.set(key, []);
      map.get(key).push({ pair: p, idx: i });
    });
    for (const items of map.values()) {
      items.sort((a, b) => b.pair.current.spread - a.pair.current.spread);
    }
    return [...map.values()];
  }

  function getRepresentativePairs() {
    return getCardGroups()
      .map(items => items[0].pair)
      .filter(pair => !pair.isAverage);
  }

  function getAveragePair() {
    return pairs.find(pair => pair.isAverage);
  }

  function getGroupItemsByPairId(pairId) {
    return getCardGroups().find(items => items.some(item => item.pair.id === pairId)) || null;
  }

  function selectPair(idx) {
    if (Number.isNaN(idx) || idx < 0) return;
    selectedIdx = idx;
    renderTodayOverview();
    renderCards();
    renderChart();
    renderPriceChart();
    renderStats();
  }

  // --- Init ---
  document.getElementById('lastUpdated').textContent = '최종 업데이트: ' + STOCK_DATA.lastUpdated;
  renderTodayOverview();
  renderCards();
  renderTable();
  renderChart();
  renderPriceChart();
  renderStats();
  bindPeriodBtns();

  function renderTodayOverview() {
    const summary = todayOverviewData || buildTodaySummaryFromPairs();
    const overviewEl = document.getElementById('todayOverview');
    if (!summary || summary.averageSpread == null) {
      overviewEl.innerHTML = '';
      return;
    }
    const representativeCount = summary.representativeCount || getRepresentativePairs().length;

    overviewEl.innerHTML = `
      <div class="today-overview-header">
        <div>
          <div class="today-overview-kicker">오늘의 우선주 현황</div>
          <div class="today-overview-title">실시간 괴리율 스냅샷</div>
        </div>
        <div class="today-overview-meta">${summary.source || '기본 데이터 기준'}</div>
      </div>
      <div class="today-overview-grid">
        ${renderMarketOverviewCard(summary.market)}
        ${renderAverageOverviewCard(summary, representativeCount)}
        ${renderLeaderOverviewCard('최고 괴리율 확대', summary.topWidening, '전 종목이 괴리율 축소 또는 보합입니다.')}
        ${renderLeaderOverviewCard('최고 괴리율 축소', summary.topNarrowing, '전 종목이 괴리율 확대 또는 보합입니다.')}
      </div>
    `;

    overviewEl.querySelectorAll('.overview-card.clickable').forEach(card => {
      card.addEventListener('click', () => {
        selectPair(parseInt(card.dataset.idx, 10));
      });
    });
  }

  function renderMarketOverviewCard(market) {
    if (!market || market.price == null) {
      return `
        <div class="overview-card primary">
          <div class="overview-label">KOSPI 지수</div>
          <div class="overview-value">-</div>
          <div class="overview-detail">금일 상승률 데이터를 불러오지 못했습니다.</div>
        </div>
      `;
    }

    return `
      <div class="overview-card primary">
        <div class="overview-label">KOSPI 지수</div>
        <div class="overview-value">${formatMarketPrice(market.price)}</div>
        <div class="overview-change ${getDirectionClass(market.changePct)}">금일상승률 ${formatPercentChange(market.changePct)}</div>
        <div class="overview-points">${formatSignedPoints(market.change, 'pt')}</div>
      </div>
    `;
  }

  function renderAverageOverviewCard(summary, representativeCount) {
    return `
      <div class="overview-card">
        <div class="overview-label">평균 괴리율</div>
        <div class="overview-value">${summary.averageSpread.toFixed(2)}%</div>
        <div class="overview-change ${getDirectionClass(summary.averageSpreadChange)}">전일비 ${formatPointChange(summary.averageSpreadChange)}</div>
        <div class="overview-summary-grid">
          ${renderOverviewStat('보통주 평균 상승률', formatPercentChange(summary.averageCommonChange))}
          ${renderOverviewStat('우선주 평균 상승률', formatPercentChange(summary.averagePreferredChange))}
        </div>
        <div class="overview-detail">대표 ${representativeCount}개 그룹 기준</div>
      </div>
    `;
  }

  function renderOverviewStat(label, value) {
    return `
      <div class="overview-stat">
        <div class="overview-stat-label">${label}</div>
        <div class="overview-stat-value ${getTextColorClass(parseDirectionalNumber(value))}">${value}</div>
      </div>
    `;
  }

  function renderLeaderOverviewCard(title, leader, emptyMessage) {
    if (!leader) {
      return `
        <div class="overview-card leader-card">
          <div class="overview-label">${title}</div>
          <div class="overview-value">없음</div>
          <div class="overview-detail">${emptyMessage}</div>
        </div>
      `;
    }

    const items = getGroupItemsByPairId(leader.id);
    if (!items || !items.length) {
      return `
        <div class="overview-card leader-card">
          <div class="overview-label">${title}</div>
          <div class="overview-value">${leader.name}</div>
          <div class="overview-change ${getDirectionClass(leader.spreadChange)}">${formatPointChange(leader.spreadChange)}</div>
          <div class="overview-detail">현재 괴리율 ${leader.spread.toFixed(2)}%</div>
        </div>
      `;
    }

    const primaryIdx = items[0].idx;
    const isActive = items.some(item => item.idx === selectedIdx);

    return `
      <div class="overview-card leader-card clickable${isActive ? ' active' : ''}" data-idx="${primaryIdx}">
        <div class="overview-label">${title}</div>
        ${renderGroupSnapshot(items)}
      </div>
    `;
  }

  function buildTodaySummaryFromPairs() {
    const representatives = getRepresentativePairs().filter(pair => pair.current.spread != null);
    if (!representatives.length) return null;

    const averagePair = getAveragePair();
    const kospiHistory = averagePair
      ? averagePair.history.filter(entry => entry.kospiPrice != null)
      : [];
    const latestKospi = kospiHistory[kospiHistory.length - 1];
    const previousKospi = kospiHistory[kospiHistory.length - 2];
    const market = latestKospi ? {
      id: 'KOSPI',
      name: '코스피',
      price: +latestKospi.kospiPrice.toFixed(2),
      change: previousKospi ? +(latestKospi.kospiPrice - previousKospi.kospiPrice).toFixed(2) : null,
      changePct: previousKospi ? +(((latestKospi.kospiPrice - previousKospi.kospiPrice) / previousKospi.kospiPrice) * 100).toFixed(2) : null,
    } : null;
    const averageSpread = representatives.reduce((sum, pair) => sum + pair.current.spread, 0) / representatives.length;
    const changeValues = representatives
      .map(pair => pair.current.spreadChange)
      .filter(value => value != null && !Number.isNaN(value));
    const averageSpreadChange = changeValues.length
      ? changeValues.reduce((sum, value) => sum + value, 0) / changeValues.length
      : null;
    const commonChangeValues = representatives
      .map(pair => pair.current.commonChange)
      .filter(value => value != null && !Number.isNaN(value));
    const preferredChangeValues = representatives
      .map(pair => pair.current.preferredChange)
      .filter(value => value != null && !Number.isNaN(value));

    const topWidening = representatives
      .filter(pair => pair.current.spreadChange > 0)
      .sort((a, b) => b.current.spreadChange - a.current.spreadChange)[0];
    const topNarrowing = representatives
      .filter(pair => pair.current.spreadChange < 0)
      .sort((a, b) => a.current.spreadChange - b.current.spreadChange)[0];

    return {
      source: '기본 데이터 기준',
      market,
      representativeCount: representatives.length,
      averageSpread: +averageSpread.toFixed(2),
      averageSpreadChange: averageSpreadChange == null ? null : +averageSpreadChange.toFixed(2),
      averageCommonChange: commonChangeValues.length
        ? +(commonChangeValues.reduce((sum, value) => sum + value, 0) / commonChangeValues.length).toFixed(2)
        : null,
      averagePreferredChange: preferredChangeValues.length
        ? +(preferredChangeValues.reduce((sum, value) => sum + value, 0) / preferredChangeValues.length).toFixed(2)
        : null,
      topWidening: topWidening ? serializePairSummary(topWidening) : null,
      topNarrowing: topNarrowing ? serializePairSummary(topNarrowing) : null,
    };
  }

  function renderGroupSnapshot(items) {
    const top = items[0];
    const p = top.pair;
    const c = p.current;
    const dir = getDirectionClass(c.spreadChange);
    const displayName = items.length > 1 ? p.commonName : p.name;

    return `
      <div class="name">${displayName}</div>
      <div class="spread-val">${c.spread.toFixed(1)}%</div>
      <div class="spread-change ${dir}">${formatPointChange(c.spreadChange)}</div>
      ${renderGroupPriceDetails(items)}
    `;
  }

  function renderGroupPriceDetails(items) {
    const p = items[0].pair;
    const c = p.current;

    if (items.length === 1) {
      return `<div class="prices">
        <span>${p.commonName} ${formatPrice(c.commonPrice)} ${fmtChange(c.commonChange)}</span>
        <span>${p.preferredName} ${formatPrice(c.preferredPrice)} ${fmtChange(c.preferredChange)}</span>
        <span class="div-info">배당 ${c.commonDivYield.toFixed(1)}% / ${c.preferredDivYield.toFixed(1)}%</span>
      </div>`;
    }

    const prefLines = items.map(item => {
      const ip = item.pair;
      const ic = ip.current;
      const suffix = ip.name.includes('/') ? ip.name.split('/')[1] : '우';
      return `<span>${suffix} ${formatPrice(ic.preferredPrice)} ${fmtChange(ic.preferredChange)} ${ic.spread.toFixed(1)}%</span>`;
    }).join('');

    return `<div class="prices">
      <span>${p.commonName} ${formatPrice(c.commonPrice)} ${fmtChange(c.commonChange)}</span>
      ${prefLines}
      <span class="div-info">배당 ${c.commonDivYield.toFixed(1)}% / ${c.preferredDivYield.toFixed(1)}%</span>
    </div>`;
  }

  function serializePairSummary(pair) {
    return {
      id: pair.id,
      name: pair.name,
      spread: pair.current.spread,
      spreadChange: pair.current.spreadChange,
    };
  }

  function formatPairName(name) {
    return String(name).replace('/', ' ');
  }

  function formatMarketPrice(value) {
    if (value == null || Number.isNaN(value)) return '-';
    return value.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function getDirectionClass(value) {
    if (value == null || Number.isNaN(value) || Math.abs(value) < 0.005) return 'flat';
    return value > 0 ? 'up' : 'down';
  }

  function getTextColorClass(value) {
    return getDirectionClass(value) + '-color';
  }

  function formatPercentChange(value) {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    if (direction === 'flat') return `${Math.abs(value).toFixed(2)}%`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${Math.abs(value).toFixed(2)}%`;
  }

  function formatSignedPoints(value, suffix = '') {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    const formatted = Math.abs(value).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (direction === 'flat') return `${formatted}${suffix}`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${formatted}${suffix}`;
  }

  function parseDirectionalNumber(value) {
    if (typeof value === 'number') return value;
    const text = String(value);
    const match = text.match(/-?\d+(?:\.\d+)?/);
    if (!match) return null;
    const parsed = parseFloat(match[0]);
    if (text.includes('▼')) return -Math.abs(parsed);
    if (text.includes('▲')) return Math.abs(parsed);
    return parsed;
  }

  function formatPointChange(value) {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    if (direction === 'flat') return `${Math.abs(value).toFixed(2)}%p`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${Math.abs(value).toFixed(2)}%p`;
  }

  // --- Cards ---
  function renderCards() {
    const cardGroups = getCardGroups();
    const el = document.getElementById('cards');
    el.innerHTML = cardGroups.map(items => {
      const top = items[0];
      const p = top.pair;
      const c = p.current;
      const primaryIdx = top.idx;
      const isActive = items.some(item => item.idx === selectedIdx);

      if (p.isAverage) {
        const dir = getDirectionClass(c.spreadChange);
        return `<div class="card avg-card${isActive ? ' active' : ''}" data-idx="${primaryIdx}">
          <div class="name">${p.name}</div>
          <div class="spread-val">${c.spread.toFixed(1)}%</div>
          <div class="spread-change ${dir}">${formatPointChange(c.spreadChange)}</div>
        </div>`;
      }

      return `<div class="card${isActive ? ' active' : ''}" data-idx="${primaryIdx}">
        ${renderGroupSnapshot(items)}
      </div>`;
    }).join('');
    el.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        selectPair(parseInt(card.dataset.idx, 10));
      });
    });
  }

  // --- Table ---
  function renderTable() {
    // Show only the highest-spread pair per group
    const cardGroups = getCardGroups();
    const tablePairs = cardGroups.map(items => items[0].pair);
    const maxSpread = Math.max(...tablePairs.filter(p => !p.isAverage).map(p => p.current.spread));

    document.getElementById('tableBody').innerHTML = tablePairs.map(p => {
      const c = p.current;
      const textColorClass = getTextColorClass(c.spreadChange);
      const barW = (c.spread / maxSpread * 100).toFixed(1);
      if (p.isAverage) {
        return `<tr style="border-top:2px solid var(--accent);border-bottom:2px solid var(--accent);background:var(--surface2)">
          <td><strong>${p.name}</strong></td>
          <td></td>
          <td></td>
          <td><strong>${c.spread.toFixed(2)}%</strong></td>
          <td class="${textColorClass}">${formatPointChange(c.spreadChange)}</td>
          <td><div class="bar-cell"><div class="bar" style="width:${barW}%;background:var(--green)"></div>${c.spread.toFixed(1)}%</div></td>
        </tr>`;
      }
      const displayName = p.name.includes('/') ? p.commonName : p.name;
      return `<tr>
        <td><strong>${displayName}</strong></td>
        <td>${formatPrice(c.commonPrice)}</td>
        <td>${formatPrice(c.preferredPrice)}</td>
        <td><strong>${c.spread.toFixed(2)}%</strong></td>
        <td class="${textColorClass}">${formatPointChange(c.spreadChange)}</td>
        <td><div class="bar-cell"><div class="bar" style="width:${barW}%"></div>${c.spread.toFixed(1)}%</div></td>
      </tr>`;
    }).join('');
  }

  // --- Stats ---
  function renderStats() {
    const p = pairs[selectedIdx];
    const hist = getFilteredHistory(p);
    const spreads = hist.map(h => h.spread);
    const min = Math.min(...spreads);
    const max = Math.max(...spreads);
    const avg = spreads.reduce((a, b) => a + b, 0) / spreads.length;
    const current = p.current.spread;

    // Percentile
    const sorted = [...spreads].sort((a, b) => a - b);
    const rank = sorted.filter(s => s <= current).length;
    const percentile = (rank / sorted.length * 100).toFixed(0);

    const statsEl = document.getElementById('statsRow');
    statsEl.innerHTML = `
      <div class="stat-box"><div class="label">현재 괴리율</div><div class="value">${current.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">평균</div><div class="value">${avg.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">최저</div><div class="value">${min.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">최고</div><div class="value">${max.toFixed(2)}%</div></div>
      <div class="stat-box"><div class="label">백분위</div><div class="value">${percentile}%</div></div>
      <div class="stat-box"><div class="label">데이터 수</div><div class="value">${hist.length}일</div></div>
    `;
  }

  // --- Chart ---
  function renderChart() {
    const p = pairs[selectedIdx];
    document.getElementById('chartTitle').textContent = p.name + ' 괴리율 추이';

    const canvas = document.getElementById('chart');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    const hist = getFilteredHistory(p);
    if (hist.length < 2) return;

    const spreads = hist.map(h => h.spread);
    const minS = Math.min(...spreads);
    const maxS = Math.max(...spreads);
    const rangeS = maxS - minS || 1;
    const avg = spreads.reduce((a, b) => a + b, 0) / spreads.length;

    const pad = { top: 20, right: 16, bottom: 36, left: 56 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;

    // Clear
    ctx.clearRect(0, 0, W, H);

    // Y axis grid
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    const yTicks = 5;
    ctx.font = '12px -apple-system, sans-serif';
    ctx.fillStyle = '#8b90a5';
    ctx.textAlign = 'right';
    for (let i = 0; i <= yTicks; i++) {
      const v = minS + (rangeS * i / yTicks);
      const y = pad.top + cH - (cH * i / yTicks);
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
      ctx.fillText(v.toFixed(1) + '%', pad.left - 8, y + 4);
    }

    // Average line
    const avgY = pad.top + cH - ((avg - minS) / rangeS * cH);
    ctx.strokeStyle = 'rgba(108,140,255,0.3)';
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.left, avgY);
    ctx.lineTo(W - pad.right, avgY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(108,140,255,0.6)';
    ctx.textAlign = 'left';
    ctx.fillText('평균 ' + avg.toFixed(1) + '%', pad.left + 4, avgY - 6);

    // X axis labels
    ctx.fillStyle = '#8b90a5';
    ctx.textAlign = 'center';
    const xLabelCount = Math.min(6, hist.length);
    for (let i = 0; i < xLabelCount; i++) {
      const idx = Math.floor(i * (hist.length - 1) / (xLabelCount - 1));
      const x = pad.left + (idx / (hist.length - 1)) * cW;
      ctx.fillText(hist[idx].date.slice(2), x, H - pad.bottom + 20);
    }

    // Gradient fill
    const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
    gradient.addColorStop(0, 'rgba(108,140,255,0.25)');
    gradient.addColorStop(1, 'rgba(108,140,255,0.0)');

    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].spread - minS) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    const lastX = pad.left + cW;
    ctx.lineTo(lastX, pad.top + cH);
    ctx.lineTo(pad.left, pad.top + cH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // Line
    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].spread - minS) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#6c8cff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Tooltip interaction
    const tooltip = document.getElementById('tooltip');
    canvas.onmousemove = function(e) {
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + cH) {
        tooltip.classList.remove('visible');
        return;
      }
      const ratio = (mx - pad.left) / cW;
      const idx = Math.round(ratio * (hist.length - 1));
      const d = hist[idx];
      if (!d) return;

      const dotX = pad.left + (idx / (hist.length - 1)) * cW;
      const dotY = pad.top + cH - ((d.spread - minS) / rangeS * cH);

      // Draw dot
      renderChart._raf && cancelAnimationFrame(renderChart._raf);
      renderChart._raf = requestAnimationFrame(() => {
        renderChart._lastCtx = ctx;
      });

      tooltip.innerHTML = `
        <div class="tt-date">${d.date}</div>
        <div class="tt-row"><span>보통주</span><span>${formatPrice(d.commonPrice)}</span></div>
        <div class="tt-row"><span>우선주</span><span>${formatPrice(d.preferredPrice)}</span></div>
        <div class="tt-row"><span><strong>괴리율</strong></span><span><strong>${d.spread.toFixed(2)}%</strong></span></div>
      `;

      let tx = dotX + 12;
      let ty = dotY - 60;
      if (tx + 180 > W) tx = dotX - 180;
      if (ty < 0) ty = dotY + 12;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    };
    canvas.onmouseleave = function() {
      tooltip.classList.remove('visible');
    };
  }

  // --- Price Chart ---
  function renderPriceChart() {
    const p = pairs[selectedIdx];
    const isAvg = !!p.isAverage;
    const hist = getFilteredHistory(p);
    if (hist.length < 2) return;

    // Title & legend
    const titleEl = document.getElementById('priceChartTitle');
    const legendEl = document.getElementById('priceLegend');
    if (isAvg) {
      titleEl.textContent = 'KOSPI 지수 추이';
      legendEl.innerHTML = '<span class="leg-kospi">KOSPI</span>';
    } else {
      titleEl.textContent = p.name + ' 시세 추이';
      legendEl.innerHTML = `<span class="leg-common">${p.commonName}</span><span class="leg-preferred">${p.preferredName}</span>`;
    }

    const canvas = document.getElementById('priceChart');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    // Canvas height = container height minus title/legend area
    const legendBottom = legendEl.getBoundingClientRect().bottom;
    const canvasH = rect.bottom - legendBottom;
    canvas.width = rect.width * dpr;
    canvas.height = canvasH * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = canvasH + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = canvasH;

    const pad = { top: 16, right: 16, bottom: 32, left: 56 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;

    ctx.clearRect(0, 0, W, H);

    if (isAvg) {
      // Single line: KOSPI
      const prices = hist.map(h => h.kospiPrice).filter(v => v != null);
      if (prices.length < 2) return;
      const kospiHist = hist.filter(h => h.kospiPrice != null);
      const minP = 0;
      const maxP = Math.max(...prices);
      const rangeP = maxP || 1;

      drawYAxis(ctx, pad, cW, cH, W, minP, maxP, rangeP, '', 'left');
      drawXAxis(ctx, pad, cH, cW, H, kospiHist);
      drawLine(ctx, pad, cW, cH, kospiHist, d => d.kospiPrice, minP, rangeP, '#38c96a', true);

      // Tooltip
      setupPriceTooltip(canvas, pad, W, cW, cH, kospiHist, (d) => {
        return `<div class="tt-date">${d.date}</div>
          <div class="tt-row"><span>KOSPI</span><span>${d.kospiPrice.toLocaleString('ko-KR')}</span></div>`;
      }, d => d.kospiPrice, minP, rangeP);
    } else {
      // Single shared axis: min=0, max from both series
      const allPrices = hist.flatMap(h => [h.commonPrice, h.preferredPrice]);
      const minP = 0;
      const maxP = Math.max(...allPrices);
      const rangeP = maxP || 1;

      drawYAxis(ctx, pad, cW, cH, W, minP, maxP, rangeP, '', 'left');
      drawXAxis(ctx, pad, cH, cW, H, hist);
      drawLine(ctx, pad, cW, cH, hist, d => d.commonPrice, minP, rangeP, '#6c8cff', false);
      drawLine(ctx, pad, cW, cH, hist, d => d.preferredPrice, minP, rangeP, '#f0615e', false);

      // Tooltip
      setupPriceTooltip(canvas, pad, W, cW, cH, hist, (d) => {
        return `<div class="tt-date">${d.date}</div>
          <div class="tt-row"><span>${p.commonName}</span><span>${formatPrice(d.commonPrice)}</span></div>
          <div class="tt-row"><span>${p.preferredName}</span><span>${formatPrice(d.preferredPrice)}</span></div>
          <div class="tt-row"><span><strong>괴리율</strong></span><span><strong>${d.spread.toFixed(2)}%</strong></span></div>`;
      }, d => d.commonPrice, minP, rangeP);
    }
  }

  function drawYAxis(ctx, pad, cW, cH, W, minV, maxV, range, suffix, side, color) {
    const yTicks = 4;
    ctx.font = '11px -apple-system, sans-serif';
    for (let i = 0; i <= yTicks; i++) {
      const v = minV + (range * i / yTicks);
      const y = pad.top + cH - (cH * i / yTicks);
      // Grid line (only draw once, from left axis)
      if (side === 'left') {
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();
      }
      ctx.fillStyle = color || '#8b90a5';
      if (side === 'left') {
        ctx.textAlign = 'right';
        ctx.fillText(formatAxisPrice(v) + suffix, pad.left - 8, y + 4);
      } else {
        ctx.textAlign = 'left';
        ctx.fillText(formatAxisPrice(v) + suffix, W - pad.right + 8, y + 4);
      }
    }
  }

  function drawXAxis(ctx, pad, cH, cW, H, hist) {
    ctx.fillStyle = '#8b90a5';
    ctx.textAlign = 'center';
    ctx.font = '11px -apple-system, sans-serif';
    const xLabelCount = Math.min(6, hist.length);
    for (let i = 0; i < xLabelCount; i++) {
      const idx = Math.floor(i * (hist.length - 1) / (xLabelCount - 1));
      const x = pad.left + (idx / (hist.length - 1)) * cW;
      ctx.fillText(hist[idx].date.slice(2), x, pad.top + cH + 20);
    }
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function drawLine(ctx, pad, cW, cH, hist, getValue, minV, range, color, fill) {
    if (fill) {
      const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
      gradient.addColorStop(0, hexToRgba(color, 0.18));
      gradient.addColorStop(1, hexToRgba(color, 0.0));
      ctx.beginPath();
      for (let i = 0; i < hist.length; i++) {
        const x = pad.left + (i / (hist.length - 1)) * cW;
        const y = pad.top + cH - ((getValue(hist[i]) - minV) / range * cH);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.lineTo(pad.left + cW, pad.top + cH);
      ctx.lineTo(pad.left, pad.top + cH);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
    }
    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((getValue(hist[i]) - minV) / range * cH);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function setupPriceTooltip(canvas, pad, W, cW, cH, hist, htmlFn, getValue, minV, range) {
    const tooltip = document.getElementById('priceTooltip');
    canvas.onmousemove = function(e) {
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + cH) {
        tooltip.classList.remove('visible');
        return;
      }
      const ratio = (mx - pad.left) / cW;
      const idx = Math.round(ratio * (hist.length - 1));
      const d = hist[idx];
      if (!d) return;

      tooltip.innerHTML = htmlFn(d);

      const dotX = pad.left + (idx / (hist.length - 1)) * cW;
      const dotY = pad.top + cH - ((getValue(d) - minV) / range * cH);
      let tx = dotX + 12;
      let ty = dotY - 60;
      if (tx + 180 > W) tx = dotX - 180;
      if (ty < 0) ty = dotY + 12;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    };
    canvas.onmouseleave = function() {
      tooltip.classList.remove('visible');
    };
  }

  function formatAxisPrice(n) {
    if (n >= 10000) return (n / 10000).toFixed(n >= 100000 ? 0 : 1) + '만';
    if (n >= 1000) return Math.round(n).toLocaleString('ko-KR');
    return n.toFixed(n < 10 ? 2 : 0);
  }

  // --- Period buttons ---
  function bindPeriodBtns() {
    document.getElementById('periodBtns').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      periodDays = parseInt(e.target.dataset.days);
      renderChart();
      renderPriceChart();
      renderStats();
    });
  }

  // --- Helpers ---
  function getFilteredHistory(pair) {
    const hist = pair.history;
    if (periodDays === 0) return hist;
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - periodDays);
    const cutStr = cutoff.toISOString().slice(0, 10);
    return hist.filter(h => h.date >= cutStr);
  }

  function formatPrice(n) {
    return n.toLocaleString('ko-KR') + '원';
  }

  function fmtChange(v) {
    if (v == null) return '';
    const direction = getDirectionClass(v);
    const cls = getTextColorClass(v);
    if (direction === 'flat') {
      return `<span class="${cls}">${Math.abs(v).toFixed(1)}%</span>`;
    }
    const arrow = direction === 'up' ? '▲' : '▼';
    return `<span class="${cls}">${arrow}${Math.abs(v).toFixed(1)}%</span>`;
  }

  // Resize
  window.addEventListener('resize', () => { renderChart(); renderPriceChart(); });

  // --- Live price updates from current.json ---
  function getPrevDaySpread(pair, today) {
    for (let i = pair.history.length - 1; i >= 0; i--) {
      if (pair.history[i].date < today) return pair.history[i].spread;
    }
    return null;
  }

  async function fetchCurrentPrices() {
    try {
      const resp = await fetch('current.json?t=' + Date.now());
      if (!resp.ok) return;
      const cur = await resp.json();
      const today = cur.lastUpdated.slice(0, 10);

      pairs.forEach(p => {
        if (p.isAverage) return;
        const cp = cur.prices[p.id];
        if (!cp) return;

        p.current.commonPrice = cp.commonPrice;
        p.current.preferredPrice = cp.preferredPrice;
        p.current.spread = cp.spread;
        if (cp.commonChange != null) p.current.commonChange = cp.commonChange;
        if (cp.preferredChange != null) p.current.preferredChange = cp.preferredChange;
        if (cp.spreadChange != null) {
          p.current.spreadChange = cp.spreadChange;
        }

        const prev = getPrevDaySpread(p, today);
        if (cp.spreadChange == null && prev !== null) {
          p.current.spreadChange = +(cp.spread - prev).toFixed(2);
        }

        // Update or add today in history
        const last = p.history[p.history.length - 1];
        if (last && last.date === today) {
          last.commonPrice = cp.commonPrice;
          last.preferredPrice = cp.preferredPrice;
          last.spread = cp.spread;
        } else {
          p.history.push({
            date: today,
            commonPrice: cp.commonPrice,
            preferredPrice: cp.preferredPrice,
            spread: cp.spread,
          });
        }
      });

      // Update average pair
      const avgPair = pairs.find(p => p.isAverage);
      if (avgPair && cur.averageSpread != null) {
        const prev = getPrevDaySpread(avgPair, today);
        avgPair.current.spread = cur.averageSpread;
        if (cur.averageSpreadChange != null) {
          avgPair.current.spreadChange = cur.averageSpreadChange;
        } else if (prev !== null) {
          avgPair.current.spreadChange = +(cur.averageSpread - prev).toFixed(2);
        }
        const last = avgPair.history[avgPair.history.length - 1];
        if (last && last.date === today) {
          last.spread = cur.averageSpread;
        } else {
          avgPair.history.push({ date: today, commonPrice: 0, preferredPrice: 0, spread: cur.averageSpread });
        }
      }

      todayOverviewData = cur.summary
        ? { ...cur.summary, source: cur.source || '네이버 증권' }
        : { ...buildTodaySummaryFromPairs(), source: cur.source || '네이버 증권' };

      document.getElementById('lastUpdated').textContent = '최종 업데이트: ' + cur.lastUpdated;
      renderTodayOverview();
      renderCards();
      renderTable();
      renderChart();
      renderPriceChart();
      renderStats();
    } catch (e) {
      // current.json not available yet, use data.js values
    }
  }

  fetchCurrentPrices();
  setInterval(fetchCurrentPrices, 10 * 60 * 1000);
})();
</script>
