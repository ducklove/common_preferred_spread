<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우선주 괴리율 대시보드</title>
<script>
(function() {
  try {
    var theme = localStorage.getItem('preferred-theme');
    document.documentElement.dataset.theme = theme === 'light' ? 'light' : 'dark';
  } catch (e) {
    document.documentElement.dataset.theme = 'dark';
  }
})();
</script>
<style>
:root {
  color-scheme: dark;
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e4e7f1;
  --text-dim: #8b90a5;
  --accent: #6c8cff;
  --up: #f0615e;
  --down: #4a90d9;
  --green: #38c96a;
  --today-glow: rgba(108,140,255,0.18);
  --today-gradient-start: rgba(108,140,255,0.12);
  --today-gradient-end: rgba(56,201,106,0.08);
  --today-border: rgba(108,140,255,0.35);
  --button-hover-bg: rgba(108,140,255,0.08);
  --overview-card-bg: rgba(15,17,23,0.38);
  --overview-card-hover-bg: rgba(15,17,23,0.54);
  --overview-card-active-bg: rgba(108,140,255,0.1);
  --overview-card-border: rgba(255,255,255,0.08);
  --overview-primary-bg: rgba(15,17,23,0.26);
  --overview-primary-border: rgba(56,201,106,0.28);
  --soft-border: rgba(255,255,255,0.08);
  --avg-card-bg: rgba(56,201,106,0.06);
  --avg-card-bg-active: rgba(56,201,106,0.12);
  --grid: rgba(255,255,255,0.06);
  --avg-line: rgba(108,140,255,0.3);
  --avg-label: rgba(108,140,255,0.6);
}
:root[data-theme="light"] {
  color-scheme: light;
  --bg: #f3f6fb;
  --surface: #ffffff;
  --surface2: #edf2fb;
  --border: #d5ddeb;
  --text: #172033;
  --text-dim: #5f6981;
  --accent: #315bdb;
  --up: #d24d46;
  --down: #1f78c8;
  --green: #1f9a54;
  --today-glow: rgba(49,91,219,0.16);
  --today-gradient-start: rgba(49,91,219,0.1);
  --today-gradient-end: rgba(31,154,84,0.08);
  --today-border: rgba(49,91,219,0.28);
  --button-hover-bg: rgba(49,91,219,0.1);
  --overview-card-bg: rgba(255,255,255,0.82);
  --overview-card-hover-bg: rgba(241,245,255,0.98);
  --overview-card-active-bg: rgba(49,91,219,0.12);
  --overview-card-border: rgba(23,32,51,0.1);
  --overview-primary-bg: rgba(255,255,255,0.9);
  --overview-primary-border: rgba(31,154,84,0.28);
  --soft-border: rgba(23,32,51,0.1);
  --avg-card-bg: rgba(31,154,84,0.07);
  --avg-card-bg-active: rgba(31,154,84,0.14);
  --grid: rgba(23,32,51,0.08);
  --avg-line: rgba(49,91,219,0.28);
  --avg-label: rgba(49,91,219,0.55);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
.header {
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header .updated-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.header .updated {
  font-size: 13px;
  color: var(--text-dim);
}
.header .theme-btn,
.header .refresh-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.header .theme-btn:hover,
.header .refresh-btn:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--button-hover-bg);
}
.header .theme-btn:disabled,
.header .refresh-btn:disabled {
  cursor: wait;
  opacity: 0.7;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 32px;
}

/* Today overview */
.today-overview {
  background:
    radial-gradient(circle at top right, var(--today-glow), transparent 36%),
    linear-gradient(135deg, var(--today-gradient-start), var(--today-gradient-end)),
    var(--surface);
  border: 1px solid var(--today-border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 24px;
}
.today-overview-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.today-overview-kicker {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.today-overview-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.today-overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.overview-card {
  background: var(--overview-card-bg);
  border: 1px solid var(--overview-card-border);
  border-radius: 12px;
  padding: 16px;
  min-height: 126px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 8px;
}
.overview-card.clickable {
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
}
.overview-card.clickable:hover {
  border-color: var(--accent);
  background: var(--overview-card-hover-bg);
  transform: translateY(-1px);
}
.overview-card.active {
  border-color: var(--accent);
  background: var(--overview-card-active-bg);
}
.overview-card.primary {
  background: var(--overview-primary-bg);
  border-color: var(--overview-primary-border);
}
.overview-card.average-card {
  align-items: center;
  text-align: center;
}
.overview-card.average-card .overview-label,
.overview-card.average-card .overview-detail {
  width: 100%;
}
.overview-card.average-card .overview-label {
  text-align: left;
}
.overview-card.average-card .overview-value {
  font-size: 42px;
  line-height: 1;
}
.overview-card.average-card .overview-summary-grid {
  width: 100%;
  margin-top: 4px;
}
.overview-card.average-card .overview-stat {
  text-align: center;
}
.overview-card.average-card .overview-detail {
  text-align: right;
}
.overview-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.overview-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.8px;
}
.overview-card.leader-card .overview-value {
  font-size: 21px;
  line-height: 1.25;
  letter-spacing: -0.4px;
}
.overview-card.leader-card .name {
  font-size: 16px;
  font-weight: 700;
}
.overview-change {
  font-size: 14px;
  font-weight: 600;
}
.overview-change.up { color: var(--up); }
.overview-change.down { color: var(--down); }
.overview-change.flat { color: var(--text-dim); }
.overview-detail {
  font-size: 12px;
  color: var(--text-dim);
}
.overview-points {
  font-size: 12px;
  color: var(--text-dim);
}
.overview-market-secondary {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--soft-border);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  font-size: 11px;
  color: var(--text-dim);
}
.overview-market-secondary-name {
  min-width: 0;
  line-height: 1.2;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.overview-market-secondary-value {
  white-space: nowrap;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.overview-market-secondary-value.up { color: var(--up); }
.overview-market-secondary-value.down { color: var(--down); }
.overview-market-secondary-value.flat { color: var(--text-dim); }
.session-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 30px;
  padding: 2px 6px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.02em;
  border: 1px solid var(--soft-border);
  background: rgba(255,255,255,0.04);
  color: var(--text-dim);
  flex-shrink: 0;
}
.session-badge.day {
  background: rgba(108,140,255,0.12);
  border-color: rgba(108,140,255,0.32);
  color: var(--accent);
}
.session-badge.night {
  background: rgba(56,201,106,0.12);
  border-color: rgba(56,201,106,0.28);
  color: var(--green);
}
.overview-split {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 170px;
  gap: 14px;
  min-height: 100%;
  align-items: start;
}
.overview-split.market {
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 12px;
}
.overview-split.runners {
  grid-template-columns: minmax(0, 1fr) 132px;
  gap: 12px;
}
.overview-split.runners.no-side {
  grid-template-columns: minmax(0, 1fr);
}
.overview-main-copy {
  min-width: 0;
}
.overview-market-line {
  margin-top: 2px;
}
.overview-side-list,
.overview-rank-list {
  border-left: 1px solid var(--soft-border);
  padding-left: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
}
.overview-mini-item {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.overview-mini-label {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.overview-mini-data {
  min-width: 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  align-items: baseline;
  gap: 8px;
}
.overview-mini-value {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.2px;
  line-height: 1.2;
}
.overview-mini-change {
  font-size: 11px;
  text-align: right;
  white-space: nowrap;
}
.overview-mini-change.up { color: var(--up); }
.overview-mini-change.down { color: var(--down); }
.overview-mini-change.flat { color: var(--text-dim); }
.overview-summary-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: auto;
}
.overview-stat {
  border-top: 1px solid var(--soft-border);
  padding-top: 10px;
}
.overview-stat-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.overview-stat-value {
  font-size: 15px;
  font-weight: 700;
}

/* Summary cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.card:hover { border-color: var(--accent); }
.card.avg-card { border-color: var(--green); background: var(--avg-card-bg); }
.card.avg-card.active { border-color: var(--green); background: var(--avg-card-bg-active); }
.card.active {
  border-color: var(--accent);
  background: var(--surface2);
}
.card .name,
.overview-card .name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card .spread-val,
.overview-card .spread-val {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -1px;
}
.spread-line {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
}
.overview-value,
.card .spread-val,
.overview-card .spread-val,
.overview-mini-value,
.overview-change,
.overview-points {
  font-variant-numeric: tabular-nums;
}
.card .spread-change,
.overview-card .spread-change {
  font-size: 13px;
  margin-top: 2px;
}
.spread-line .spread-change,
.spread-line .overview-change {
  margin-top: 0;
  white-space: nowrap;
  text-align: right;
}
.overview-card.average-card .spread-line {
  justify-content: center;
  gap: 12px;
}
.overview-card .spread-change.emphasis {
  font-weight: 800;
}
.card .spread-change.up { color: var(--up); }
.card .spread-change.down { color: var(--down); }
.card .spread-change.flat { color: var(--text-dim); }
.overview-card .spread-change.up { color: var(--up); }
.overview-card .spread-change.down { color: var(--down); }
.overview-card .spread-change.flat { color: var(--text-dim); }
.card .prices,
.overview-card .prices {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.price-line {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.price-label {
  min-width: 0;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.price-value {
  margin-left: auto;
  text-align: right;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.change-value {
  display: inline-block;
  min-width: 6.8ch;
  text-align: right;
}
.card .div-yield {
  color: var(--green);
  font-weight: 600;
}
.card .div-info,
.overview-card .div-info {
  color: var(--green);
  font-size: 11px;
  margin-top: 2px;
}
.overview-rank-item {
  appearance: none;
  width: 100%;
  border: none;
  background: transparent;
  color: inherit;
  cursor: pointer;
  font: inherit;
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 1px 0;
  text-align: left;
  transition: color 0.15s, transform 0.15s;
}
.overview-rank-item:hover {
  color: var(--accent);
  transform: translateX(1px);
}
.overview-rank-item.active {
  color: var(--accent);
}
.overview-rank-name {
  font-size: 11.5px;
  font-weight: 600;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.autofit-wrap {
  white-space: normal !important;
  overflow: visible !important;
  text-overflow: clip !important;
  overflow-wrap: anywhere;
}
.overview-rank-meta {
  color: var(--text-dim);
  font-size: 10.5px;
  display: flex;
  align-items: baseline;
  gap: 4px;
  flex-wrap: wrap;
}
.overview-rank-meta .spread-change {
  margin-top: 0;
}
.overview-rank-empty {
  color: var(--text-dim);
  font-size: 11px;
  padding-top: 2px;
}

/* Chart area */
.chart-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
}
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.chart-title {
  font-size: 17px;
  font-weight: 600;
}
.period-btns {
  display: flex;
  gap: 4px;
}
.period-btns button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.period-btns button:hover { border-color: var(--accent); color: var(--text); }
.period-btns button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.chart-container {
  position: relative;
  width: 100%;
  height: 380px;
}
canvas { display: block; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.stat-box .label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-box .value {
  font-size: 20px;
  font-weight: 700;
}

/* Comparison table */
.table-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.table-section h2 {
  font-size: 17px;
  font-weight: 600;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 10px 16px;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
th.numeric,
td.numeric {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
th.sortable {
  cursor: pointer;
  user-select: none;
}
th.sortable::after {
  content: '↕';
  display: inline-block;
  margin-left: 6px;
  opacity: 0.35;
  font-size: 11px;
}
th.sortable.sorted-asc::after {
  content: '↑';
  opacity: 0.9;
}
th.sortable.sorted-desc::after {
  content: '↓';
  opacity: 0.9;
}
th.sortable:hover {
  color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:hover { background: var(--surface2); }
.up-color { color: var(--up); }
.down-color { color: var(--down); }
.flat-color { color: var(--text-dim); }

/* Bar in table */
.bar-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}
td.numeric .bar-cell {
  width: 100%;
  justify-content: flex-end;
}
.bar {
  height: 8px;
  border-radius: 4px;
  background: var(--accent);
  transition: width 0.3s;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  min-width: 160px;
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-date { color: var(--text-dim); margin-bottom: 6px; }
.tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }
.tooltip .tt-row span:last-child {
  margin-left: auto;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Price chart */
.price-chart-container {
  position: relative;
  width: 100%;
  height: 250px;
  margin-top: 16px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.price-chart-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.price-legend {
  display: flex;
  gap: 16px;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text-dim);
}
.price-legend span::before {
  content: '';
  display: inline-block;
  width: 12px;
  height: 3px;
  margin-right: 4px;
  vertical-align: middle;
  border-radius: 2px;
}
.price-legend .leg-common::before { background: var(--accent); }
.price-legend .leg-preferred::before { background: var(--up); }
.price-legend .leg-kospi::before { background: var(--green); }

@media (max-width: 768px) {
  .header, .container { padding-left: 16px; padding-right: 16px; }
  .today-overview-title { font-size: 20px; }
  .cards { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .chart-container { height: 280px; }
  .price-chart-container { height: 200px; }
}
@media (max-width: 1100px) {
  .overview-split {
    grid-template-columns: 1fr;
  }
  .overview-split.market {
    grid-template-columns: 1fr;
  }
  .overview-split.runners {
    grid-template-columns: 1fr;
  }
  .overview-side-list,
  .overview-rank-list {
    border-left: none;
    border-top: 1px solid var(--soft-border);
    padding-left: 0;
    padding-top: 12px;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>우선주 괴리율 대시보드</h1>
  <div class="updated-row">
    <div class="updated" id="lastUpdated"></div>
    <button type="button" class="theme-btn" id="themeBtn">일반 모드</button>
    <button type="button" class="refresh-btn" id="refreshBtn">새로 고침</button>
  </div>
</div>

  <div class="today-overview" id="todayOverview"></div>
  <div class="cards" id="cards"></div>

  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title" id="chartTitle">삼성전자 괴리율 추이</div>
      <div class="period-btns" id="periodBtns">
        <button data-days="30">1M</button>
        <button data-days="90">3M</button>

      </div>
    </div>
    <div class="chart-container">
      <canvas id="chart"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="price-chart-container">
      <div class="price-chart-title" id="priceChartTitle">시세 추이</div>
      <div class="price-legend" id="priceLegend"></div>

          <th>종목</th>
          <th class="numeric">보통주</th>
          <th class="numeric">우선주</th>
          <th class="numeric">보통주 시총</th>
          <th class="numeric">우선주 시총</th>
          <th class="numeric">우선주 비율</th>
          <th class="numeric">변동</th>

        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script src="data.js"></script>
<script>
(function() {
  const pairs = STOCK_DATA.pairs;
  const THEME_STORAGE_KEY = 'preferred-theme';
  const LIVE_REFRESH_MAX_AGE_MS = 60 * 1000;
  const LIVE_REFRESH_RETRY_DELAY_MS = 1500;
  const LIVE_REFRESH_RETRY_ATTEMPTS = 3;
  const LIVE_REFRESH_FORCE_ATTEMPTS = 1;
  const LIVE_FETCH_TIMEOUT_MS = 2500;
  const LIVE_REFRESH_TIMEOUT_MS = 15000;
  const AUTO_REFRESH_INTERVAL_MS = 300 * 1000;
  const LIVE_PROXY_URL = 'https://api.codetabs.com/v1/proxy?quest=';
  const LIVE_HANKYUNG_FUTURES_URL = 'https://markets.hankyung.com/indices/kospi-future';
  const LIVE_NIGHT_FUTURES_URL = 'https://kr.investing.com/indices/korea-200-futures';
  const LIVE_ESIGNAL_NIGHT_SOCKET_URL = 'wss://esignal.co.kr/proxy/8888/socket.io/?EIO=4&transport=websocket';
  const LIVE_FETCH_BATCH_SIZE = 20;
  const LIVE_FETCH_BATCH_CONCURRENCY = 2;
  const EMA_ALPHA = 0.1;
  const TABLE_SORT_DEFAULT_DIRECTION = {
    name: 'asc',
    commonMarketCap: 'desc',
    preferredMarketCap: 'desc',
    preferredRatio: 'desc',
    spreadChange: 'desc',
    spread: 'desc',
  };
  const TABLE_HEADER_CONFIG = [
    { key: 'name', label: '\uC885\uBAA9', sortable: true, numeric: false },
    { key: 'commonPrice', label: '\uBCF4\uD1B5\uC8FC', sortable: false, numeric: true },
    { key: 'preferredPrice', label: '\uC6B0\uC120\uC8FC', sortable: false, numeric: true },
    { key: 'commonMarketCap', label: '\uBCF4\uD1B5\uC8FC \uC2DC\uCD1D', sortable: true, numeric: true },
    { key: 'preferredMarketCap', label: '\uC6B0\uC120\uC8FC \uC2DC\uCD1D', sortable: true, numeric: true },
    { key: 'preferredRatio', label: '\uC6B0\uC120\uC8FC \uBE44\uC728', sortable: true, numeric: true },
    { key: 'spreadChange', label: '\uBCC0\uB3D9', sortable: true, numeric: true },
    { key: 'spread', label: '\uAD34\uB9AC\uC728', sortable: true, numeric: true },
  ];
  const MARKET_EXTRA_SPECS = [
    { id: 'KOSDAQ', name: 'KOSDAQ', unit: '', priceDecimals: 2 },
    { id: 'USDKRW', name: '환율', unit: '원', priceDecimals: 2 },
    { id: 'GOLD', name: '금가격 (COMEX)', unit: '', priceDecimals: 2 },
    { id: 'SP500', name: 'S&P500', unit: '', priceDecimals: 2 },
  ];
  let currentTheme = document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';
  let selectedIdx = 0;
  let periodDays = 0; // 0 = all
  let latestMarketExtras = [];
  let latestNightFutureMetric = null;
  let todayOverviewData = buildTodaySummaryFromPairs();
  latestMarketExtras = normalizeMarketExtras(todayOverviewData?.market?.extras || []);
  latestNightFutureMetric = todayOverviewData?.market?.nightFuture || todayOverviewData?.market?.future || null;
  let latestAppliedSnapshotMs = parseSnapshotTimestamp(STOCK_DATA.lastUpdated)?.getTime() || 0;
  let liveRefreshPromise = null;
  let currentPricesFetchPromise = null;
  let autoRefreshTimer = null;
  let lastCurrentPricesFetchStartedAt = 0;
  let refreshButtonBusy = false;
  let pairConfigMap = new Map();
  let tableSortState = {
    key: 'name',
    direction: TABLE_SORT_DEFAULT_DIRECTION.name,
  };
  const configLoadPromise = loadPairConfig();

  function getCardGroups() {
    const map = new Map();
    pairs.forEach((p, i) => {
      if (p.isAverage) {
        map.set('__avg__', [{ pair: p, idx: i }]);
        return;
      }
      const key = p.commonName;
      if (!map.has(key)) map.set(key, []);
      map.get(key).push({ pair: p, idx: i });
    });
    for (const items of map.values()) {
      items.sort((a, b) => b.pair.current.spread - a.pair.current.spread);
    }
    const groups = [...map.values()];
    const averageGroup = groups.find(items => items[0]?.pair.isAverage) || null;
    const stockGroups = groups
      .filter(items => !items[0]?.pair.isAverage)
      .sort((a, b) => {
        const spreadA = a[0]?.pair.current.spread ?? Number.NEGATIVE_INFINITY;
        const spreadB = b[0]?.pair.current.spread ?? Number.NEGATIVE_INFINITY;
        if (spreadB !== spreadA) return spreadB - spreadA;
        const nameA = a[0]?.pair.commonName || a[0]?.pair.name || '';
        const nameB = b[0]?.pair.commonName || b[0]?.pair.name || '';
        return nameA.localeCompare(nameB, 'ko');
      });

    return averageGroup ? [averageGroup, ...stockGroups] : stockGroups;
  }

  function getRepresentativePairs() {
    return getCardGroups()
      .map(items => items[0].pair)
      .filter(pair => !pair.isAverage);
  }

  function getAveragePair() {
    return pairs.find(pair => pair.isAverage);
  }

  function getAverageHistoryMarketFallback() {
    const averagePair = getAveragePair();
    if (!averagePair) return null;

    const kospiHistory = averagePair.history.filter(entry => entry.kospiPrice != null);
    const latestKospi = kospiHistory[kospiHistory.length - 1];
    const previousKospi = kospiHistory[kospiHistory.length - 2];
    if (!latestKospi) return null;

    return {
      id: 'KOSPI',
      name: '코스피',
      price: +latestKospi.kospiPrice.toFixed(2),
      change: previousKospi ? +(latestKospi.kospiPrice - previousKospi.kospiPrice).toFixed(2) : null,
      changePct: previousKospi ? +(((latestKospi.kospiPrice - previousKospi.kospiPrice) / previousKospi.kospiPrice) * 100).toFixed(2) : null,
    };
  }

  function getRenderableMarketSummary(market) {
    return mergeMarketSummary(
      market,
      mergeMarketSummary(getAverageHistoryMarketFallback(), { extras: latestMarketExtras }),
    );
  }

  function normalizeNightFutureMetric(metric) {
    if (!metric) return null;
    return {
      ...metric,
      price: metric.price != null ? Number(metric.price) : null,
      change: metric.change != null ? Number(metric.change) : null,
      changePct: metric.changePct != null ? Number(metric.changePct) : null,
    };
  }

  function hasNightFutureMetricValue(metric) {
    if (!metric) return false;
    return [metric.price, metric.change, metric.changePct].some(
      value => value != null && !Number.isNaN(value)
    );
  }

  function getFutureSessionKind(metric, now = new Date()) {
    if (!metric) return null;
    const source = String(metric.source || '').toLowerCase();
    const marketStatus = String(metric.marketStatus || '');
    const timeText = String(metric.time || '');

    if (['esignal_socket', 'investing_html', 'kis_websocket_trade'].includes(source)) {
      return 'night';
    }
    if (['hankyung_html', 'kis_future_quote'].includes(source)) {
      return 'day';
    }
    if (marketStatus.includes('야간') || timeText.includes('야간')) {
      return 'night';
    }
    if (marketStatus.includes('장중') || marketStatus.includes('장마감')) {
      return 'day';
    }
    return isCurrentKstNightSession(now) ? 'night' : 'day';
  }

  function isNightFutureMetricCurrent(metric, now = new Date()) {
    if (!metric || !hasNightFutureMetricValue(metric)) return false;
    const sessionKind = getFutureSessionKind(metric, now);
    if (!metric.sessionTradeDate) {
      return isCurrentKstNightSession(now) ? sessionKind === 'night' : sessionKind !== 'night';
    }
    return isCurrentKstNightSession(now)
      ? (sessionKind === 'night' && metric.sessionTradeDate === getCurrentKstNightSessionDateString(now))
      : (sessionKind !== 'night' && metric.sessionTradeDate === getCurrentKstDateString(now));
  }

  function mergeNightFutureMetric(primaryMetric, fallbackMetric, preservedMetric = latestNightFutureMetric) {
    const primary = normalizeNightFutureMetric(primaryMetric);
    const fallback = normalizeNightFutureMetric(fallbackMetric);
    const preserved = normalizeNightFutureMetric(preservedMetric);
    const candidates = [primary, fallback, preserved];
    return candidates.find(metric => isNightFutureMetricCurrent(metric))
      || candidates.find(metric => metric && !metric.sessionTradeDate && hasNightFutureMetricValue(metric))
      || null;
  }

  function fitTextToWidth(el, { maxFontSize, minFontSize }) {
    if (!el) return;

    el.style.fontSize = `${maxFontSize}px`;
    el.classList.remove('autofit-wrap');

    if (!el.clientWidth) return;
    while (parseFloat(el.style.fontSize) > minFontSize && el.scrollWidth > el.clientWidth + 1) {
      el.style.fontSize = `${(parseFloat(el.style.fontSize) - 0.5).toFixed(1)}px`;
    }

    if (el.scrollWidth > el.clientWidth + 1) {
      el.classList.add('autofit-wrap');
    }
  }

  function applyAutoFitText(root = document) {
    const configs = [
      { selector: '.overview-card.leader-card .name', maxFontSize: 16, minFontSize: 12 },
      { selector: '.card .name, .overview-card:not(.leader-card) .name', maxFontSize: 14, minFontSize: 11 },
      { selector: '.overview-rank-name', maxFontSize: 11.5, minFontSize: 9.5 },
      { selector: '.price-label', maxFontSize: 12, minFontSize: 9.5 },
    ];

    configs.forEach(config => {
      root.querySelectorAll(config.selector).forEach(el => fitTextToWidth(el, config));
    });
  }

  function getThemeColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function getChartTheme() {
    return {
      accent: getThemeColor('--accent'),
      up: getThemeColor('--up'),
      green: getThemeColor('--green'),
      textDim: getThemeColor('--text-dim'),
      grid: getThemeColor('--grid'),
      avgLine: getThemeColor('--avg-line'),
      avgLabel: getThemeColor('--avg-label'),
    };
  }

  function updateThemeButtonLabel() {
    const themeBtn = document.getElementById('themeBtn');
    if (!themeBtn) return;
    themeBtn.textContent = currentTheme === 'dark' ? '일반 모드' : '다크 모드';
    themeBtn.setAttribute('aria-label', currentTheme === 'dark' ? '일반 모드로 전환' : '다크 모드로 전환');
  }

  function applyTheme(theme, { persist = true, rerender = true } = {}) {
    currentTheme = theme === 'light' ? 'light' : 'dark';
    document.documentElement.dataset.theme = currentTheme;
    updateThemeButtonLabel();

    if (persist) {
      try {
        localStorage.setItem(THEME_STORAGE_KEY, currentTheme);
      } catch (e) {
        // 저장 실패 시 현재 세션 테마만 적용한다.
      }
    }

    if (rerender) {
      renderChart();
      renderPriceChart();
    }
  }

  function bindThemeButton() {
    const themeBtn = document.getElementById('themeBtn');
    if (!themeBtn) return;
    themeBtn.addEventListener('click', () => {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    });
    updateThemeButtonLabel();
  }

  function normalizeMarketExtras(extras = []) {
    const byId = new Map();
    extras.forEach(metric => {
      if (!metric || !metric.id) return;
      const spec = MARKET_EXTRA_SPECS.find(item => item.id === metric.id) || {};
      byId.set(metric.id, {
        ...spec,
        ...metric,
        name: metric.name || spec.name || metric.id,
        unit: metric.unit != null ? metric.unit : (spec.unit || ''),
      });
    });
    return MARKET_EXTRA_SPECS.map(spec => byId.get(spec.id) || {
      ...spec,
      price: null,
      change: null,
      changePct: null,
      marketStatus: null,
    });
  }

  function hasMarketMetricValue(metric) {
    return metric && metric.price != null && !Number.isNaN(metric.price);
  }

  function mergeMarketExtras(primaryExtras = [], fallbackExtras = [], preservedExtras = []) {
    const primary = normalizeMarketExtras(primaryExtras);
    const fallback = normalizeMarketExtras(fallbackExtras);
    const preserved = normalizeMarketExtras(preservedExtras);

    return MARKET_EXTRA_SPECS.map(spec => {
      const candidates = [
        primary.find(metric => metric.id === spec.id),
        fallback.find(metric => metric.id === spec.id),
        preserved.find(metric => metric.id === spec.id),
      ];
      return candidates.find(hasMarketMetricValue)
        || candidates.find(Boolean)
        || {
          ...spec,
          price: null,
          change: null,
          changePct: null,
          marketStatus: null,
        };
    });
  }

  function mergeMarketSummary(primaryMarket, fallbackMarket) {
    if (!primaryMarket && !fallbackMarket) return null;
    const primary = primaryMarket || {};
    const fallback = fallbackMarket || {};

    return {
      id: primary.id || fallback.id || 'KOSPI',
      name: primary.name || fallback.name || '코스피',
      price: primary.price != null ? primary.price : fallback.price ?? null,
      change: primary.change != null ? primary.change : fallback.change ?? null,
      changePct: primary.changePct != null ? primary.changePct : fallback.changePct ?? null,
      marketStatus: primary.marketStatus || fallback.marketStatus || null,
      unit: primary.unit != null ? primary.unit : fallback.unit ?? null,
      extras: mergeMarketExtras(primary.extras || [], fallback.extras || [], latestMarketExtras),
      nightFuture: mergeNightFutureMetric(
        primary.nightFuture || primary.future || null,
        fallback.nightFuture || fallback.future || null,
      ),
    };
  }

  async function loadPairConfig() {
    try {
      const resp = await fetch('config.json?t=' + Date.now());
      if (!resp.ok) return pairConfigMap;
      const config = await resp.json();
      pairConfigMap = new Map(config.map(item => [item.id, item]));
    } catch (e) {
      // config.json 로드 실패 시 실시간 강제 갱신은 건너뛴다.
    }
    return pairConfigMap;
  }

  function getGroupItemsByPairId(pairId) {
    return getCardGroups().find(items => items.some(item => item.pair.id === pairId)) || null;
  }

  function selectPair(idx) {
    if (Number.isNaN(idx) || idx < 0) return;
    selectedIdx = idx;
    renderTodayOverview();
    renderCards();
    renderChart();
    renderPriceChart();
    renderStats();
  }

  // --- Init ---
  document.getElementById('lastUpdated').textContent = '최종 업데이트: ' + STOCK_DATA.lastUpdated;
  bindThemeButton();
  bindTableSortHeaders();
  renderTodayOverview();
  renderCards();
  renderTable();
  renderChart();
  renderPriceChart();
  renderStats();
  bindPeriodBtns();

  function renderTodayOverview() {
    const summary = todayOverviewData || buildTodaySummaryFromPairs();
    const overviewEl = document.getElementById('todayOverview');
    if (!summary || summary.averageSpread == null) {
      overviewEl.innerHTML = '';
      return;
    }
    const representativeCount = summary.representativeCount || getRepresentativePairs().length;

    overviewEl.innerHTML = `
      <div class="today-overview-header">
        <div>
          <div class="today-overview-kicker">오늘의 우선주 현황</div>
          <div class="today-overview-title">실시간 괴리율 스냅샷</div>
        </div>
      </div>
      <div class="today-overview-grid">
        ${renderAverageOverviewCard(summary, representativeCount)}
        ${renderMarketOverviewCard(summary.market)}
        ${renderLeaderOverviewCard('최고 괴리율 확대', summary.topWidening, summary.topWideningRunners || [], '전 종목이 괴리율 축소 또는 보합입니다.')}
        ${renderLeaderOverviewCard('최고 괴리율 축소', summary.topNarrowing, summary.topNarrowingRunners || [], '전 종목이 괴리율 확대 또는 보합입니다.')}
      </div>
    `;

    overviewEl.querySelectorAll('.overview-card.clickable').forEach(card => {
      card.addEventListener('click', () => {
        selectPair(parseInt(card.dataset.idx, 10));
      });
    });
    overviewEl.querySelectorAll('.overview-rank-item[data-idx]').forEach(item => {
      item.addEventListener('click', event => {
        event.stopPropagation();
        selectPair(parseInt(item.dataset.idx, 10));
      });
    });
    applyAutoFitText(overviewEl);
  }

  function renderMarketOverviewCard(market) {
    const mergedMarket = getRenderableMarketSummary(market);
    const extras = mergeMarketExtras(mergedMarket?.extras || [], latestMarketExtras);
    const futureMetric = mergeNightFutureMetric(
      mergedMarket?.nightFuture || null,
      latestNightFutureMetric,
    );
    const kosdaqMetric = extras.find(metric => metric.id === 'KOSDAQ') || null;
    const sideMetrics = extras.filter(metric => metric.id !== 'KOSDAQ');
    const secondaryMetric = kosdaqMetric || futureMetric;
    if (futureMetric && secondaryMetric !== futureMetric) {
      sideMetrics.unshift(futureMetric);
    }

    return `
      <div class="overview-card primary">
        <div class="overview-split market">
          <div class="overview-main-copy">
            <div class="overview-label">KOSPI 지수</div>
            <div class="overview-value overview-market-line">${formatMarketPrice(mergedMarket?.price)}</div>
            <div class="overview-change ${getDirectionClass(mergedMarket?.changePct)}">${formatPercentChange(mergedMarket?.changePct)}</div>
            <div class="overview-points">${formatSignedPoints(mergedMarket?.change, 'pt')}</div>
            ${renderMarketSecondaryMetric(secondaryMetric)}
          </div>
          <div class="overview-side-list">
            ${sideMetrics.map(renderMarketExtraMetric).join('')}
          </div>
        </div>
      </div>
    `;
  }

  function renderAverageOverviewCard(summary, representativeCount) {
    return `
      <div class="overview-card average-card">
        <div class="overview-label">평균 괴리율</div>
        <div class="spread-line">
          <div class="overview-value">${summary.averageSpread.toFixed(2)}%</div>
          <div class="overview-change ${getDirectionClass(summary.averageSpreadChange)}">전일비 ${formatPointChange(summary.averageSpreadChange)}</div>
        </div>
        <div class="overview-summary-grid">
          ${renderOverviewStat('우선주 평균 상승률', formatPercentChange(summary.averagePreferredChange))}
          ${renderOverviewStat('보통주 평균 상승률', formatPercentChange(summary.averageCommonChange))}
        </div>
        <div class="overview-detail">대표 ${representativeCount}개 그룹 기준</div>
      </div>
    `;
  }

  function renderOverviewStat(label, value) {
    return `
      <div class="overview-stat">
        <div class="overview-stat-label">${label}</div>
        <div class="overview-stat-value ${getTextColorClass(parseDirectionalNumber(value))}">${value}</div>
      </div>
    `;
  }

  function getFutureSessionLabel(metric) {
    const sessionKind = getFutureSessionKind(metric);
    if (sessionKind === 'night') return '야간';
    if (sessionKind === 'day') return '주간';
    return null;
  }

  function renderSessionBadge(label) {
    const sessionClass = label === '야간' ? 'night' : 'day';
    return `<span class="session-badge ${sessionClass}">${label}</span>`;
  }

  function renderMarketExtraMetric(metric) {
    const sessionLabel = metric.id === 'KOSPI200_FUTURES' ? getFutureSessionLabel(metric) : null;
    return `
      <div class="overview-mini-item">
        <div class="overview-mini-label">${metric.name}${sessionLabel ? renderSessionBadge(sessionLabel) : ''}</div>
        <div class="overview-mini-data">
          <div class="overview-mini-value">${formatCompactMetricValue(metric)}</div>
          <div class="overview-mini-change ${getDirectionClass(metric.changePct)}">${formatPercentChange(metric.changePct)}</div>
        </div>
      </div>
    `;
  }

  function renderMarketSecondaryMetric(metric) {
    if (!metric) return '';
    const label = metric.name || 'KOSPI200 선물';
    const sessionLabel = metric.id === 'KOSPI200_FUTURES' ? getFutureSessionLabel(metric) : null;
    return `
      <div class="overview-market-secondary">
        <span class="overview-market-secondary-name">${label}${sessionLabel ? renderSessionBadge(sessionLabel) : ''}</span>
        <span class="overview-market-secondary-value ${getDirectionClass(metric.changePct)}">${formatMarketPrice(metric.price)} ${formatPercentChange(metric.changePct)}</span>
      </div>
    `;
  }

  function renderLeaderOverviewCard(title, leader, runners, emptyMessage) {
    if (!leader) {
      return `
        <div class="overview-card leader-card">
          <div class="overview-label">${title}</div>
          <div class="overview-value">없음</div>
          <div class="overview-detail">${emptyMessage}</div>
        </div>
      `;
    }

    const items = getGroupItemsByPairId(leader.id);
    if (!items || !items.length) {
      return `
        <div class="overview-card leader-card">
          <div class="overview-label">${title}</div>
          <div class="overview-value">${leader.name}</div>
          <div class="overview-change ${getDirectionClass(leader.spreadChange)}">${formatPointChange(leader.spreadChange)}</div>
          <div class="overview-detail">현재 괴리율 ${leader.spread.toFixed(2)}%</div>
        </div>
      `;
    }

    const primaryIdx = items[0].idx;
    const isActive = items.some(item => item.idx === selectedIdx);
    const hasRunners = Array.isArray(runners) && runners.length > 0;

    return `
      <div class="overview-card leader-card clickable${isActive ? ' active' : ''}" data-idx="${primaryIdx}">
        <div class="overview-label">${title}</div>
        <div class="overview-split runners${hasRunners ? '' : ' no-side'}">
          <div class="overview-main-copy">
            ${renderGroupSnapshot(items, { emphasizeChange: true })}
          </div>
          ${hasRunners ? renderLeaderRunnerPanel(runners) : ''}
        </div>
      </div>
    `;
  }

  function buildTodaySummaryFromPairs(marketOverride = null) {
    const representatives = getRepresentativePairs().filter(pair => pair.current.spread != null);
    if (!representatives.length) return null;

    const market = getRenderableMarketSummary(marketOverride);
    const averageSpread = representatives.reduce((sum, pair) => sum + pair.current.spread, 0) / representatives.length;
    const changeValues = representatives
      .map(pair => pair.current.spreadChange)
      .filter(value => value != null && !Number.isNaN(value));
    const averageSpreadChange = changeValues.length
      ? changeValues.reduce((sum, value) => sum + value, 0) / changeValues.length
      : null;
    const commonChangeValues = representatives
      .map(pair => pair.current.commonChange)
      .filter(value => value != null && !Number.isNaN(value));
    const preferredChangeValues = representatives
      .map(pair => pair.current.preferredChange)
      .filter(value => value != null && !Number.isNaN(value));

    const topWideningRanked = representatives
      .filter(pair => pair.current.spreadChange > 0)
      .sort((a, b) => b.current.spreadChange - a.current.spreadChange);
    const topNarrowingRanked = representatives
      .filter(pair => pair.current.spreadChange < 0)
      .sort((a, b) => a.current.spreadChange - b.current.spreadChange);
    const rankedByWidening = representatives
      .filter(pair => pair.current.spreadChange != null && !Number.isNaN(pair.current.spreadChange))
      .sort((a, b) => b.current.spreadChange - a.current.spreadChange);
    const rankedByNarrowing = representatives
      .filter(pair => pair.current.spreadChange != null && !Number.isNaN(pair.current.spreadChange))
      .sort((a, b) => a.current.spreadChange - b.current.spreadChange);
    const topWidening = topWideningRanked[0] || rankedByWidening[0] || null;
    const topNarrowing = topNarrowingRanked[0] || rankedByNarrowing[0] || null;

    return {
      source: '기본 데이터 기준',
      market,
      representativeCount: representatives.length,
      averageSpread: +averageSpread.toFixed(2),
      averageSpreadChange: averageSpreadChange == null ? null : +averageSpreadChange.toFixed(2),
      averageCommonChange: commonChangeValues.length
        ? +(commonChangeValues.reduce((sum, value) => sum + value, 0) / commonChangeValues.length).toFixed(2)
        : null,
      averagePreferredChange: preferredChangeValues.length
        ? +(preferredChangeValues.reduce((sum, value) => sum + value, 0) / preferredChangeValues.length).toFixed(2)
        : null,
      topWidening: topWidening ? serializePairSummary(topWidening) : null,
      topWideningRunners: rankedByWidening
        .filter(pair => !topWidening || pair.id !== topWidening.id)
        .slice(0, 4)
        .map(serializePairSummary),
      topNarrowing: topNarrowing ? serializePairSummary(topNarrowing) : null,
      topNarrowingRunners: rankedByNarrowing
        .filter(pair => !topNarrowing || pair.id !== topNarrowing.id)
        .slice(0, 4)
        .map(serializePairSummary),
    };
  }

  function renderLeaderRunnerPanel(runners = []) {

    if (!pair.name.includes('/')) return '우';

  function serializePairSummary(pair) {
    return {
      id: pair.id,
      name: pair.name,
      spread: pair.current.spread,
      spreadChange: pair.current.spreadChange,
    };
  }

  function formatPairName(name) {
    return String(name).replace('/', ' ');
  }

  function formatMarketPrice(value) {
    if (value == null || Number.isNaN(value)) return '-';
    return value.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatCompactMetricValue(metric) {
    if (!metric || metric.price == null || Number.isNaN(metric.price)) return '-';
    const decimals = metric.priceDecimals == null ? 2 : metric.priceDecimals;
    return metric.price.toLocaleString('ko-KR', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals,
    });
  }

  function getDirectionClass(value) {
    if (value == null || Number.isNaN(value) || Math.abs(value) < 0.005) return 'flat';
    return value > 0 ? 'up' : 'down';
  }

  function getTextColorClass(value) {
    return getDirectionClass(value) + '-color';
  }

  function formatPercentChange(value) {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    if (direction === 'flat') return `${Math.abs(value).toFixed(2)}%`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${Math.abs(value).toFixed(2)}%`;
  }

  function formatSignedPoints(value, suffix = '') {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    const formatted = Math.abs(value).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (direction === 'flat') return `${formatted}${suffix}`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${formatted}${suffix}`;
  }

  function parseDirectionalNumber(value) {
    if (typeof value === 'number') return value;
    const text = String(value);
    const match = text.match(/-?\d+(?:\.\d+)?/);
    if (!match) return null;
    const parsed = parseFloat(match[0]);
    if (text.includes('▼')) return -Math.abs(parsed);
    if (text.includes('▲')) return Math.abs(parsed);
    return parsed;
  }

  function formatPointChange(value) {
    if (value == null || Number.isNaN(value)) return '-';
    const direction = getDirectionClass(value);
    if (direction === 'flat') return `${Math.abs(value).toFixed(2)}%p`;
    const arrow = direction === 'up' ? '▲' : '▼';
    return `${arrow} ${Math.abs(value).toFixed(2)}%p`;
  }

  function renderTableHeaders() {
    const headers = document.querySelectorAll('.table-section thead th');
    headers.forEach((th, index) => {
      const config = TABLE_HEADER_CONFIG[index];
      if (!config) return;
      th.textContent = config.label;
      th.dataset.sortKey = config.sortable ? config.key : '';
      th.tabIndex = config.sortable ? 0 : -1;
      th.classList.toggle('sortable', !!config.sortable);
      th.classList.toggle('numeric', !!config.numeric);
      th.classList.toggle('sorted-asc', tableSortState.key === config.key && tableSortState.direction === 'asc');
      th.classList.toggle('sorted-desc', tableSortState.key === config.key && tableSortState.direction === 'desc');
      th.setAttribute('aria-sort', config.sortable
        ? (tableSortState.key === config.key
          ? (tableSortState.direction === 'asc' ? 'ascending' : 'descending')
          : 'none')
        : 'none');
    });
  }

  function bindTableSortHeaders() {
    document.querySelectorAll('.table-section thead th').forEach((th, index) => {
      if (th.dataset.sortBound === '1') return;
      th.dataset.sortBound = '1';
      const handleSort = () => {
        const config = TABLE_HEADER_CONFIG[index];
        if (!config?.sortable) return;
        if (tableSortState.key === config.key) {
          tableSortState.direction = tableSortState.direction === 'asc' ? 'desc' : 'asc';
        } else {
          tableSortState = {
            key: config.key,
            direction: TABLE_SORT_DEFAULT_DIRECTION[config.key] || 'desc',
          };
        }
        renderTable();
      };
      th.addEventListener('click', handleSort);
      th.addEventListener('keydown', event => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        event.preventDefault();
        handleSort();
      });
    });
  }

  function getPairTableName(pair) {
    return pair?.preferredName || pair?.name || pair?.commonName || '';
  }

  function getTableRowMetrics(pair) {
    const current = pair.current || {};
    const commonMarketCap = calculateLiveMarketCap(
      current.commonPrice,
      current.commonSharesOutstanding,
      current.commonMarketCap,
    );
    const preferredMarketCap = calculateLiveMarketCap(
      current.preferredPrice,
      current.preferredSharesOutstanding,
      current.preferredMarketCap,
    );
    return {
      pair,
      name: getPairTableName(pair),
      commonMarketCap,
      preferredMarketCap,
      preferredRatio: calculatePreferredRatio(commonMarketCap, preferredMarketCap),
      spread: pair.current.spread,
      spreadChange: pair.current.spreadChange,
    };
  }

  function compareTableMetric(a, b, direction) {
    const aMissing = a == null || Number.isNaN(a);
    const bMissing = b == null || Number.isNaN(b);
    if (aMissing && bMissing) return 0;
    if (aMissing) return 1;
    if (bMissing) return -1;
    if (a === b) return 0;
    return direction === 'asc' ? a - b : b - a;
  }

  function compareTableRows(a, b) {
    if (tableSortState.key === 'name') {
      const base = a.name.localeCompare(b.name, 'ko');
      return tableSortState.direction === 'asc' ? base : -base;
    }

    const metricCompare = compareTableMetric(a[tableSortState.key], b[tableSortState.key], tableSortState.direction);
    if (metricCompare !== 0) return metricCompare;
    return a.name.localeCompare(b.name, 'ko');
  }

  // --- Table ---

    renderTableHeaders();

    const averagePair = getAveragePair();
    const stockRows = pairs
      .filter(p => !p.isAverage)
      .map(getTableRowMetrics)
      .sort(compareTableRows);
    const maxSpread = Math.max(1, ...stockRows.map(row => row.spread || 0));
    const tablePairs = [
      ...(averagePair ? [averagePair] : []),
      ...stockRows.map(row => row.pair),

    const stockMetricsById = new Map(stockRows.map(row => [row.pair.id, row]));

    document.getElementById('tableBody').innerHTML = tablePairs.map(p => {
      const c = p.current;

      const row = stockMetricsById.get(p.id);
      const displayName = row?.name || getPairTableName(p);
      const commonMarketCap = row?.commonMarketCap ?? null;

      return `<tr>

        <td class="numeric"><div class="bar-cell"><div class="bar" style="width:${barW}%"></div>${c.spread.toFixed(1)}%</div></td>
      </tr>`;

  // --- Chart ---
  function renderChart() {
    const p = pairs[selectedIdx];
    const theme = getChartTheme();
    document.getElementById('chartTitle').textContent = p.name + ' 괴리율 추이';

    const canvas = document.getElementById('chart');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    const fullHist = p.history || [];
    const hist = getFilteredHistory(p);
    if (hist.length < 2) return;

    const spreads = hist.map(h => h.spread);
    const minS = Math.min(...spreads);
    const maxS = Math.max(...spreads);
    const rangeS = maxS - minS || 1;
    const fullSmaSeries = calculateSmaSeries(fullHist.map(entry => entry.spread), 250);
    const fullEmaSeries = calculateEmaSeries(fullHist.map(entry => entry.spread));
    const smaByDate = new Map(fullHist.map((entry, index) => [entry.date, fullSmaSeries[index]]));
    const emaByDate = new Map(fullHist.map((entry, index) => [entry.date, fullEmaSeries[index]]));
    const smaSeries = hist.map(entry => smaByDate.get(entry.date));
    const emaSeries = hist.map(entry => emaByDate.get(entry.date));
    const latestSma = smaSeries[smaSeries.length - 1] ?? calculateSma(spreads, 250);
    const latestEma = emaSeries[emaSeries.length - 1] ?? calculateLatestEma(spreads);

    const pad = { top: 20, right: 16, bottom: 36, left: 56 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;

    const drawTrendSeries = (series, color, dashPattern) => {
      let started = false;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.setLineDash(dashPattern);
      ctx.beginPath();
      series.forEach((value, i) => {
        if (value == null || Number.isNaN(value)) return;
        const x = pad.left + (i / (hist.length - 1)) * cW;
        const y = pad.top + cH - ((value - minS) / rangeS * cH);
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      });
      if (started) ctx.stroke();
      ctx.setLineDash([]);
    };

    // Clear
    ctx.clearRect(0, 0, W, H);

    // Y axis grid
    ctx.strokeStyle = theme.grid;
    ctx.lineWidth = 1;
    const yTicks = 5;
    ctx.font = '12px -apple-system, sans-serif';
    ctx.fillStyle = theme.textDim;
    ctx.textAlign = 'right';
    for (let i = 0; i <= yTicks; i++) {
      const v = minS + (rangeS * i / yTicks);
      const y = pad.top + cH - (cH * i / yTicks);
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
      ctx.fillText(v.toFixed(1) + '%', pad.left - 8, y + 4);
    }

    // X axis labels
    ctx.fillStyle = theme.textDim;
    ctx.textAlign = 'center';
    const xLabelCount = Math.min(6, hist.length);
    for (let i = 0; i < xLabelCount; i++) {
      const idx = Math.floor(i * (hist.length - 1) / (xLabelCount - 1));
      const x = pad.left + (idx / (hist.length - 1)) * cW;
      ctx.fillText(hist[idx].date.slice(2), x, H - pad.bottom + 20);
    }

    // Gradient fill
    const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
    gradient.addColorStop(0, 'rgba(108,140,255,0.25)');
    gradient.addColorStop(1, 'rgba(108,140,255,0.0)');

    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].spread - minS) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    const lastX = pad.left + cW;
    ctx.lineTo(lastX, pad.top + cH);
    ctx.lineTo(pad.left, pad.top + cH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // SMA / EMA trend lines
    drawTrendSeries(smaSeries, theme.avgLine, [6, 4]);
    drawTrendSeries(emaSeries, theme.green, [2, 4]);
    ctx.fillStyle = theme.avgLabel;
    ctx.textAlign = 'right';
    if (latestSma != null && !Number.isNaN(latestSma)) {
      ctx.fillText(`SMA 250 ${latestSma.toFixed(1)}%`, W - pad.right, pad.top + 12);
    }
    if (latestEma != null && !Number.isNaN(latestEma)) {
      ctx.fillStyle = theme.green;
      ctx.fillText(`EMA 0.1 ${latestEma.toFixed(1)}%`, W - pad.right, pad.top + 28);
    }

    // Line
    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((hist[i].spread - minS) / rangeS * cH);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = theme.accent;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Tooltip interaction
    const tooltip = document.getElementById('tooltip');
    canvas.onmousemove = function(e) {
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;
      if (mx < pad.left || mx > W - pad.right || my < pad.top || my > pad.top + cH) {
        tooltip.classList.remove('visible');
        return;
      }
      const ratio = (mx - pad.left) / cW;
      const idx = Math.round(ratio * (hist.length - 1));
      const d = hist[idx];
      if (!d) return;

      const dotX = pad.left + (idx / (hist.length - 1)) * cW;
      const dotY = pad.top + cH - ((d.spread - minS) / rangeS * cH);

      // Draw dot
      renderChart._raf && cancelAnimationFrame(renderChart._raf);
      renderChart._raf = requestAnimationFrame(() => {
        renderChart._lastCtx = ctx;
      });

      tooltip.innerHTML = `
        <div class="tt-date">${d.date}</div>
        <div class="tt-row"><span>보통주</span><span>${formatPrice(d.commonPrice)}</span></div>
        <div class="tt-row"><span>우선주</span><span>${formatPrice(d.preferredPrice)}</span></div>
        <div class="tt-row"><span><strong>괴리율</strong></span><span><strong>${d.spread.toFixed(2)}%</strong></span></div>
      `;

      let tx = dotX + 12;
      let ty = dotY - 60;
      if (tx + 180 > W) tx = dotX - 180;
      if (ty < 0) ty = dotY + 12;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    };
    canvas.onmouseleave = function() {
      tooltip.classList.remove('visible');
    };
  }
  // --- Price Chart ---
  function renderPriceChart() {
    const p = pairs[selectedIdx];
    const isAvg = !!p.isAverage;
    const hist = getFilteredHistory(p);
    const theme = getChartTheme();
    const detailLabels = isAvg ? null : getDetailLabels(p);
    if (hist.length < 2) return;

    // Title & legend
    const titleEl = document.getElementById('priceChartTitle');
    const legendEl = document.getElementById('priceLegend');
    if (isAvg) {
      titleEl.textContent = 'KOSPI 지수 추이';
      legendEl.innerHTML = '<span class="leg-kospi">KOSPI</span>';
    } else {
      titleEl.textContent = p.name + ' 시세 추이';
      legendEl.innerHTML = `<span class="leg-common">${detailLabels.common}</span><span class="leg-preferred">${detailLabels.preferred}</span>`;
    }

    const canvas = document.getElementById('priceChart');
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    // Canvas height = container height minus title/legend area
    const legendBottom = legendEl.getBoundingClientRect().bottom;
    const canvasH = rect.bottom - legendBottom;
    canvas.width = rect.width * dpr;
    canvas.height = canvasH * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = canvasH + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = canvasH;

    const pad = { top: 16, right: 16, bottom: 32, left: 56 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;

    ctx.clearRect(0, 0, W, H);

    if (isAvg) {
      // Single line: KOSPI
      const prices = hist.map(h => h.kospiPrice).filter(v => v != null);
      if (prices.length < 2) return;
      const kospiHist = hist.filter(h => h.kospiPrice != null);
      const minP = 0;
      const maxP = Math.max(...prices);
      const rangeP = maxP || 1;

      drawYAxis(ctx, pad, cW, cH, W, minP, maxP, rangeP, '', 'left');
      drawXAxis(ctx, pad, cH, cW, H, kospiHist);
      drawLine(ctx, pad, cW, cH, kospiHist, d => d.kospiPrice, minP, rangeP, theme.green, true);

      // Tooltip
      setupPriceTooltip(canvas, pad, W, cW, cH, kospiHist, (d) => {
        return `<div class="tt-date">${d.date}</div>
          <div class="tt-row"><span>KOSPI</span><span>${d.kospiPrice.toLocaleString('ko-KR')}</span></div>`;
      }, d => d.kospiPrice, minP, rangeP);
    } else {
      // Single shared axis: min=0, max from both series
      const allPrices = hist.flatMap(h => [h.commonPrice, h.preferredPrice]);
      const minP = 0;
      const maxP = Math.max(...allPrices);
      const rangeP = maxP || 1;

      drawYAxis(ctx, pad, cW, cH, W, minP, maxP, rangeP, '', 'left');
      drawXAxis(ctx, pad, cH, cW, H, hist);
      drawLine(ctx, pad, cW, cH, hist, d => d.commonPrice, minP, rangeP, theme.accent, false);
      drawLine(ctx, pad, cW, cH, hist, d => d.preferredPrice, minP, rangeP, theme.up, false);

      // Tooltip
      setupPriceTooltip(canvas, pad, W, cW, cH, hist, (d) => {
        return `<div class="tt-date">${d.date}</div>
          <div class="tt-row"><span>${detailLabels.common}</span><span>${formatPrice(d.commonPrice)}</span></div>
          <div class="tt-row"><span>${detailLabels.preferred}</span><span>${formatPrice(d.preferredPrice)}</span></div>
          <div class="tt-row"><span><strong>괴리율</strong></span><span><strong>${d.spread.toFixed(2)}%</strong></span></div>`;
      }, d => d.commonPrice, minP, rangeP);
    }
  }

  function drawYAxis(ctx, pad, cW, cH, W, minV, maxV, range, suffix, side, color) {
    const theme = getChartTheme();
    const yTicks = 4;
    ctx.font = '11px -apple-system, sans-serif';
    for (let i = 0; i <= yTicks; i++) {
      const v = minV + (range * i / yTicks);
      const y = pad.top + cH - (cH * i / yTicks);
      // Grid line (only draw once, from left axis)
      if (side === 'left') {
        ctx.strokeStyle = theme.grid;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();
      }
      ctx.fillStyle = color || theme.textDim;
      if (side === 'left') {
        ctx.textAlign = 'right';
        ctx.fillText(formatAxisPrice(v) + suffix, pad.left - 8, y + 4);
      } else {
        ctx.textAlign = 'left';
        ctx.fillText(formatAxisPrice(v) + suffix, W - pad.right + 8, y + 4);
      }
    }
  }

  function drawXAxis(ctx, pad, cH, cW, H, hist) {
    ctx.fillStyle = getChartTheme().textDim;
    ctx.textAlign = 'center';
    ctx.font = '11px -apple-system, sans-serif';
    const xLabelCount = Math.min(6, hist.length);
    for (let i = 0; i < xLabelCount; i++) {
      const idx = Math.floor(i * (hist.length - 1) / (xLabelCount - 1));
      const x = pad.left + (idx / (hist.length - 1)) * cW;
      ctx.fillText(hist[idx].date.slice(2), x, pad.top + cH + 20);
    }
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function drawLine(ctx, pad, cW, cH, hist, getValue, minV, range, color, fill) {
    if (fill) {
      const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
      gradient.addColorStop(0, hexToRgba(color, 0.18));
      gradient.addColorStop(1, hexToRgba(color, 0.0));
      ctx.beginPath();
      for (let i = 0; i < hist.length; i++) {
        const x = pad.left + (i / (hist.length - 1)) * cW;
        const y = pad.top + cH - ((getValue(hist[i]) - minV) / range * cH);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.lineTo(pad.left + cW, pad.top + cH);
      ctx.lineTo(pad.left, pad.top + cH);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
    }
    ctx.beginPath();
    for (let i = 0; i < hist.length; i++) {
      const x = pad.left + (i / (hist.length - 1)) * cW;
      const y = pad.top + cH - ((getValue(hist[i]) - minV) / range * cH);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function calculatePairBeta(hist) {
    if (!Array.isArray(hist) || hist.length < 2) return null;

    const commonReturns = [];
    const preferredReturns = [];

    for (let i = 1; i < hist.length; i++) {
      const prev = hist[i - 1];
      const curr = hist[i];
      const prevCommon = prev?.commonPrice;
      const currCommon = curr?.commonPrice;
      const prevPreferred = prev?.preferredPrice;
      const currPreferred = curr?.preferredPrice;

      if (
        prevCommon == null || currCommon == null || prevPreferred == null || currPreferred == null
        || prevCommon <= 0 || currCommon <= 0 || prevPreferred <= 0 || currPreferred <= 0
      ) {
        continue;
      }

      commonReturns.push((currCommon - prevCommon) / prevCommon);
      preferredReturns.push((currPreferred - prevPreferred) / prevPreferred);
    }

    if (commonReturns.length < 2) return null;

    const commonMean = commonReturns.reduce((sum, value) => sum + value, 0) / commonReturns.length;
    const preferredMean = preferredReturns.reduce((sum, value) => sum + value, 0) / preferredReturns.length;

    let covariance = 0;
    let variance = 0;

    for (let i = 0; i < commonReturns.length; i++) {
      const commonDelta = commonReturns[i] - commonMean;
      covariance += commonDelta * (preferredReturns[i] - preferredMean);
      variance += commonDelta * commonDelta;
    }

    if (variance === 0) return null;

    return covariance / variance;
  }

  function calculateEmaSeries(values, alpha = EMA_ALPHA) {
    if (!Array.isArray(values) || !values.length) return [];

    let ema = null;
    return values.map(value => {
      if (value == null || Number.isNaN(value)) return ema;
      ema = ema == null ? value : ((alpha * value) + ((1 - alpha) * ema));
      return ema;
    });
  }

  function calculateLatestEma(values, alpha = EMA_ALPHA) {
    const series = calculateEmaSeries(values, alpha);
    for (let i = series.length - 1; i >= 0; i--) {
      const value = series[i];
      if (value != null && !Number.isNaN(value)) return value;
    }
    return null;
  }

  function calculateSma(values, windowSize) {
    if (!Array.isArray(values) || !values.length) return null;
    const sliced = values.slice(-windowSize).filter(value => value != null && !Number.isNaN(value));
    if (!sliced.length) return null;
    return sliced.reduce((sum, value) => sum + value, 0) / sliced.length;
  }

  function calculateSmaSeries(values, windowSize) {
    if (!Array.isArray(values) || !values.length) return [];

    const series = [];
    let rollingSum = 0;
    let validCount = 0;
    const queue = [];

    values.forEach(value => {
      const normalized = value == null || Number.isNaN(value) ? null : value;
      queue.push(normalized);
      if (normalized != null) {
        rollingSum += normalized;
        validCount += 1;
      }

      if (queue.length > windowSize) {
        const removed = queue.shift();
        if (removed != null) {
          rollingSum -= removed;
          validCount -= 1;
        }
      }

      series.push(validCount ? rollingSum / validCount : null);
    });

    return series;
  }

  function calculateLiveMarketCap(price, sharesOutstanding, fallbackMarketCap = null) {
    if (
      price != null && !Number.isNaN(price) && price > 0
      && sharesOutstanding != null && !Number.isNaN(sharesOutstanding) && sharesOutstanding > 0
    ) {
      return price * sharesOutstanding;
    }
    if (fallbackMarketCap != null && !Number.isNaN(fallbackMarketCap) && fallbackMarketCap > 0) {

    return null;

  function calculatePreferredRatio(commonMarketCap, preferredMarketCap) {
    if (
      commonMarketCap == null || Number.isNaN(commonMarketCap) || commonMarketCap <= 0
      || preferredMarketCap == null || Number.isNaN(preferredMarketCap) || preferredMarketCap < 0
    ) {
      return null;
    }
    return preferredMarketCap / commonMarketCap * 100;
  }

  // --- Live price updates from current.json ---
  function getPrevDaySpread(pair, today) {
    for (let i = pair.history.length - 1; i >= 0; i--) {
      if (pair.history[i].date < today) return pair.history[i].spread;

  function parseSnapshotTimestamp(timestamp) {
    if (!timestamp) return null;
    const normalized = String(timestamp).includes('T')
      ? String(timestamp)
      : String(timestamp).replace(' ', 'T');
    const withTimezone = /([+-]\d{2}:\d{2}|Z)$/.test(normalized)
      ? normalized
      : normalized + '+09:00';
    const parsed = new Date(withTimezone);
    return Number.isNaN(parsed.getTime()) ? null : parsed;
  }

  function formatKstTimestamp(value) {
    const parsed = value instanceof Date ? value : parseSnapshotTimestamp(value);
    if (!parsed) return '';

    const parts = new Intl.DateTimeFormat('sv-SE', {
      timeZone: 'Asia/Seoul',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false,
    }).formatToParts(parsed);
    const partMap = Object.fromEntries(parts.map(part => [part.type, part.value]));
    return `${partMap.year}-${partMap.month}-${partMap.day} ${partMap.hour}:${partMap.minute}:${partMap.second}`;
  }

  function getCurrentKstDateString(now = new Date()) {
    return formatKstTimestamp(now).slice(0, 10);
  }

  function getCurrentKstDayMonth(now = new Date()) {
    const timestamp = formatKstTimestamp(now);
    return `${timestamp.slice(8, 10)}/${timestamp.slice(5, 7)}`;
  }

  function isCurrentKstNightSession(now = new Date()) {
    const hour = Number(formatKstTimestamp(now).slice(11, 13));
    return hour >= 18 || hour < 6;
  }

  function getCurrentKstNightSessionDateString(now = new Date()) {
    const base = parseSnapshotTimestamp(formatKstTimestamp(now));
    if (!base) return '';
    if (Number(formatKstTimestamp(base).slice(11, 13)) < 6) {
      base.setDate(base.getDate() - 1);
    }
    return formatKstTimestamp(base).slice(0, 10);
  }

  function getCurrentKstNightSessionDayMonth(now = new Date()) {
    const dateText = getCurrentKstNightSessionDateString(now);
    return `${dateText.slice(8, 10)}/${dateText.slice(5, 7)}`;
  }

  function isSnapshotMsStale(timestampMs, maxAgeMs = LIVE_REFRESH_MAX_AGE_MS) {
    if (!timestampMs) return true;
    return Date.now() - timestampMs > maxAgeMs;

  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));

  function withCacheBustingParam(url) {
    const separator = url.includes('?') ? '&' : '?';
    return `${url}${separator}_ts=${Date.now()}`;
  }

  async function fetchWithTimeout(url, responseType = 'json', timeoutMs = LIVE_FETCH_TIMEOUT_MS) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

    try {
      const proxiedUrl = LIVE_PROXY_URL + encodeURIComponent(withCacheBustingParam(url));
      const resp = await fetch(proxiedUrl, {
        signal: controller.signal,
        cache: 'no-store',
      });
      if (!resp.ok) {
        throw new Error(`실시간 조회 실패 (${resp.status})`);
      }
      return responseType === 'text' ? resp.text() : resp.json();
    } catch (e) {
      if (e && e.name === 'AbortError') {
        throw new Error('실시간 조회 시간 초과');
      }
      throw e;
    } finally {
      clearTimeout(timeoutId);
    }
  }

  async function runWithTimeout(task, timeoutMs, errorMessage) {
    let timeoutId = null;
    try {
      return await Promise.race([
        task,
        new Promise((_, reject) => {
          timeoutId = setTimeout(() => reject(new Error(errorMessage)), timeoutMs);
        }),
      ]);
    } finally {
      if (timeoutId) clearTimeout(timeoutId);
    }
  }
